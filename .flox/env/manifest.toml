schema-version = "1.12.0"

[install]
bun.pkg-path = "bun"
bun.version = "^1.3.13"
act.pkg-path = "act"
act.version = "^0.2.88"
curl.pkg-path = "curl"
curl.version = "^8.19.0"
curl.outputs = "all"
jq.pkg-path = "jq"
jq.version = "^1.8.1"
jq.outputs = "all"
go-task.pkg-path = "go-task"
go-task.version = "^3.48.0"
markdownlint-cli.pkg-path = "markdownlint-cli"
markdownlint-cli.version = "^0.48.0"
infer.flake = "github:inference-gateway/cli/v0.121.1"
claude-code.pkg-path = "claude-code"
claude-code.version = "^2.1.170"
claude-code.pkg-group = "claude-code"
codex.pkg-path = "codex"
codex.version = "^0.135.0"
codex.pkg-group = "codex"

[hook]
on-activate = """
  bun install
"""
