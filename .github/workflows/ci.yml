---
name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build, lint, test, package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Lint markdown
        run: bun run lint:md

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Package
        run: bun run package

      - name: Verify dist/ is up to date
        run: |
          if ! git diff --quiet --exit-code dist/; then
            echo "::error::dist/ is out of date. Run 'bun run package' locally and commit the result."
            git diff --stat dist/
            git diff dist/
            exit 1
          fi
          echo "dist/ matches the committed bundle."

      - name: Verify provider wiring is up to date
        run: |
          bun run generate
          if ! git diff --quiet --exit-code action.yml src/redact.ts README.md; then
            echo "::error::Provider wiring is out of date. Run 'task generate' (or 'bun run generate') locally and commit the result."
            git diff --stat action.yml src/redact.ts README.md
            git diff action.yml src/redact.ts README.md
            exit 1
          fi
          echo "Provider wiring matches the schemas Provider enum."

      - name: Smoke-test runner against mock agent
        env:
          INFER_BIN: ${{ github.workspace }}/__tests__/fixtures/mock-agent.mjs
          MOCK_SCENARIO: happy
          MOCK_TICK_MS: "50"
          GITHUB_TOKEN: smoke-test-fake-token
          INFER_REPO: ${{ github.repository }}
          INFER_CONTEXT_KIND: issue
          INFER_ISSUE_NUMBER: "0"
          INFER_ISSUE_TITLE: smoke test
          INFER_ISSUE_BODY: smoke test body
          INFER_COOKING_COMMENT_ID: "0"
          INFER_AGENT_MODEL: mock/mock-v1
          INFER_ENABLE_GIT_OPERATIONS: "false"
        run: |
          bun dist/runner/index.js

      - name: Smoke-test runner against mock agent (direct mode)
        env:
          INFER_BIN: ${{ github.workspace }}/__tests__/fixtures/mock-agent.mjs
          MOCK_SCENARIO: happy
          MOCK_TICK_MS: "50"
          GITHUB_TOKEN: smoke-test-fake-token
          INFER_REPO: ${{ github.repository }}
          INFER_CONTEXT_KIND: direct
          INFER_DIRECT_PROMPT: smoke test direct prompt
          INFER_AGENT_MODEL: mock/mock-v1
          INFER_ENABLE_GIT_OPERATIONS: "false"
        run: |
          bun dist/runner/index.js

      - name: Smoke-test runner in dry-run (no token, zero mutations)
        env:
          INFER_BIN: ${{ github.workspace }}/__tests__/fixtures/mock-agent.mjs
          MOCK_SCENARIO: happy
          MOCK_TICK_MS: "50"
          INFER_DRY_RUN: "true"
          INFER_REPO: ${{ github.repository }}
          INFER_CONTEXT_KIND: issue
          INFER_ISSUE_NUMBER: "1"
          INFER_ISSUE_TITLE: dry-run smoke
          INFER_ISSUE_BODY: dry-run smoke body
          INFER_COOKING_COMMENT_ID: "999999999"
          INFER_AGENT_MODEL: mock/mock-v1
          INFER_ENABLE_GIT_OPERATIONS: "false"
        run: |
          out=$(bun dist/runner/index.js 2>&1)
          echo "$out"
          echo "$out" | grep -q "DRY RUN - the agent would be invoked with:" \
            || { echo "::error::dry-run banner missing"; exit 1; }
          echo "$out" | grep -q "\[dry-run\] would update the plan zone of comment #999999999" \
            || { echo "::error::dry-run did not simulate the plan-zone update"; exit 1; }

  # Contract test against the pinned CLI: the env vars the runner sets are
  # silently ignored by the CLI when renamed upstream (INFER_AGENT_SYSTEM_PROMPT
  # died in v0.105.0, INFER_PROMPTS_AGENT_SYSTEM_REMINDERS_* in v0.125.0). This
  # job fails at CLI-bump time instead of silently dropping the system prompt.
  cli-contract:
    name: CLI env-var contract test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install pinned Infer CLI
        run: |
          VERSION=$(sed -n '/^  version:/,/^    default:/p' action.yml | sed -n 's/.*default: "\(v[0-9][0-9.]*\)".*/\1/p')
          test -n "$VERSION" || { echo "::error::could not parse pinned CLI version from action.yml"; exit 1; }
          echo "Pinned CLI: $VERSION"
          curl -fsSL https://raw.githubusercontent.com/inference-gateway/cli/main/install.sh | bash -s -- --version "$VERSION"
          infer version

      - name: Seed userspace config (same as the action)
        working-directory: ${{ runner.temp }}
        run: infer init

      - name: System prompt env override reaches the CLI
        working-directory: ${{ runner.temp }}
        run: |
          out=$(INFER_PROMPTS_AGENT_SYSTEM_PROMPT="INFER_ACTION_CONTRACT_MARKER" infer debug agent system_prompt)
          echo "$out" | grep -q "INFER_ACTION_CONTRACT_MARKER" \
            || { echo "::error::INFER_PROMPTS_AGENT_SYSTEM_PROMPT no longer reaches the CLI system prompt - the action's GitHub instructions would be silently dropped. Find the renamed env var in inference-gateway/cli and update buildChildEnv in src/runner.ts."; exit 1; }

      - name: WITH_DEFAULTS pin still gates the dynamic context block
        working-directory: ${{ runner.temp }}
        run: |
          with_defaults=$(INFER_PROMPTS_AGENT_SYSTEM_PROMPT="INFER_ACTION_CONTRACT_MARKER" INFER_AGENT_SYSTEM_PROMPT_WITH_DEFAULTS=true infer debug agent system_prompt)
          without_defaults=$(INFER_PROMPTS_AGENT_SYSTEM_PROMPT="INFER_ACTION_CONTRACT_MARKER" INFER_AGENT_SYSTEM_PROMPT_WITH_DEFAULTS=false infer debug agent system_prompt)
          echo "$with_defaults" | grep -q "WORKING DIRECTORY:" \
            || { echo "::error::INFER_AGENT_SYSTEM_PROMPT_WITH_DEFAULTS=true no longer appends the CLI's dynamic context block (skills/memory/tools)."; exit 1; }
          if echo "$without_defaults" | grep -q "WORKING DIRECTORY:"; then
            echo "::error::INFER_AGENT_SYSTEM_PROMPT_WITH_DEFAULTS no longer binds - the env var was likely renamed upstream."
            exit 1
          fi
