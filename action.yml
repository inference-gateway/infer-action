name: 'Infer Agent Action'
description: 'Run Infer CLI agent on GitHub issues with support for multiple AI providers, automatic pull request creation, and progress tracking'
author: 'Inference Gateway'

branding:
  icon: 'cpu'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for posting comments and accessing API'
    required: true

  trigger-phrase:
    description: 'Phrase to trigger the agent (e.g., @infer)'
    required: false
    default: '@infer'

  model:
    description: 'Model to use (e.g., anthropic/claude-sonnet-4, openai/gpt-4, google/gemini-pro)'
    required: true

  version:
    description: 'Infer CLI version to install (default: v0.112.2)'
    required: false
    default: 'v0.112.2'

  anthropic-api-key:
    description: 'Anthropic API key (required if using Anthropic models)'
    required: false

  openai-api-key:
    description: 'OpenAI API key (required if using OpenAI models)'
    required: false

  google-api-key:
    description: 'Google API key (required if using Google/Gemini models)'
    required: false

  deepseek-api-key:
    description: 'DeepSeek API key (required if using DeepSeek models)'
    required: false

  groq-api-key:
    description: 'Groq API key (required if using Groq models)'
    required: false

  mistral-api-key:
    description: 'Mistral API key (required if using Mistral models)'
    required: false

  cloudflare-api-key:
    description: 'Cloudflare API key (required if using Cloudflare models)'
    required: false

  cohere-api-key:
    description: 'Cohere API key (required if using Cohere models)'
    required: false

  ollama-api-key:
    description: 'Ollama API key (required if using Ollama)'
    required: false

  ollama-cloud-api-key:
    description: 'Ollama Cloud API key (required if using Ollama Cloud)'
    required: false

  max-turns:
    description: 'Maximum number of agent iterations (default: 50)'
    required: false
    default: '50'

  custom-instructions:
    description: 'Custom instructions to append to the default agent instructions (which include plan creation, progress tracking, file changes, and PR workflow)'
    required: false
    default: ''

  bash-whitelist-commands:
    description: 'Comma-separated list of bash commands to whitelist (e.g., "npm,yarn,pnpm"). These are added to the default whitelist.'
    required: false
    default: ''

  bash-whitelist-patterns:
    description: 'Comma-separated list of regex patterns to whitelist bash commands (e.g., "^npm .*,^yarn .*"). These are added to the default patterns.'
    required: false
    default: ''

  enable-git-operations:
    description: 'Enable git operations (checkout, add, commit, push). Default: true. Set to false if you want the agent to only post comments without creating PRs.'
    required: false
    default: 'true'

  skills:
    description: |
      Newline-separated list of Infer skills to install before the agent runs.
      Each entry is passed to `infer skills install`. Lines starting with `#` are
      treated as comments. When non-empty, skills are auto-enabled for the agent
      (INFER_AGENT_SKILLS_ENABLED=true).

      Accepted entry forms (per `infer skills install --help`):
        - Bare skill name:    maintainer
            -> https://github.com/inference-gateway/skills/tree/main/skills/maintainer
        - <org>/<skill> pair: acme/internal-comms
            -> https://github.com/acme/skills/tree/main/skills/internal-comms
        - Full GitHub URL:    https://github.com/anthropics/skills/tree/main/skills/pdf

      Examples:
        skills: maintainer

        skills: |
          maintainer
          acme/internal-comms

        skills: |
          # first-party
          maintainer
          # custom layout / pinned branch
          https://github.com/my-org/agent-bundles/tree/v1.2/skills/triage
    required: false
    default: ''

outputs:
  result:
    description: 'Result of the agent execution'
    value: ${{ steps.run-agent.outputs.result }}

  exit-code:
    description: 'Exit code from agent command'
    value: ${{ steps.run-agent.outputs.exit-code }}

  failed-tool-calls-count:
    description: 'Number of failed tool calls detected in agent output'
    value: ${{ steps.run-agent.outputs.failed-count }}

runs:
  using: 'composite'
  steps:
    - name: Check trigger conditions
      id: check-trigger
      shell: bash
      run: |
        TRIGGERED=false
        TRIGGER_PHRASE="${{ inputs.trigger-phrase }}"
        MODEL_OVERRIDE=""

        extract_model_override() {
          local text="$1"
          if [[ "$text" =~ /model[[:space:]]+([a-zA-Z0-9/_.:-]+) ]]; then
            echo "${BASH_REMATCH[1]}"
          fi
        }

        if [[ "${{ github.event_name }}" == "issues" ]]; then
          ISSUE_TITLE=$(cat <<'ISSUE_TITLE_EOF'
        ${{ github.event.issue.title }}
        ISSUE_TITLE_EOF
        )
          ISSUE_BODY=$(cat <<'ISSUE_BODY_EOF'
        ${{ github.event.issue.body }}
        ISSUE_BODY_EOF
        )

          if [[ "$ISSUE_TITLE" == *"$TRIGGER_PHRASE"* ]] || [[ "$ISSUE_BODY" == *"$TRIGGER_PHRASE"* ]]; then
            TRIGGERED=true
            MODEL_OVERRIDE=$(extract_model_override "$ISSUE_BODY")
            if [[ -n "$MODEL_OVERRIDE" ]]; then
              echo "Detected model override from issue body: $MODEL_OVERRIDE"
            fi
          fi
        fi

        if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
          COMMENT_AUTHOR="${{ github.event.comment.user.login }}"

          if [[ "$COMMENT_AUTHOR" == *"[bot]" ]] || [[ "${{ github.event.comment.user.type }}" == "Bot" ]]; then
            echo "Comment is from bot user '$COMMENT_AUTHOR'. Skipping to prevent recursion."
            TRIGGERED=false
          else
            COMMENT_BODY=$(cat <<'COMMENT_BODY_EOF'
        ${{ github.event.comment.body }}
        COMMENT_BODY_EOF
        )
            COMMENT_ID="${{ github.event.comment.id }}"

            if [[ "$COMMENT_BODY" == *"$TRIGGER_PHRASE"* ]]; then
              TRIGGERED=true
              echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT
              MODEL_OVERRIDE=$(extract_model_override "$COMMENT_BODY")
              if [[ -n "$MODEL_OVERRIDE" ]]; then
                echo "Detected model override: $MODEL_OVERRIDE"
              fi
            fi
          fi
        fi

        echo "model_override=$MODEL_OVERRIDE" >> $GITHUB_OUTPUT
        echo "triggered=$TRIGGERED" >> $GITHUB_OUTPUT

        if [[ "$TRIGGERED" == "false" ]]; then
          echo "Trigger phrase '$TRIGGER_PHRASE' not found. Skipping action."
          exit 0
        fi

        echo "Trigger phrase '$TRIGGER_PHRASE' detected. Proceeding with agent execution."

    - name: Add eyes emoji reaction to comment
      if: steps.check-trigger.outputs.triggered == 'true' && github.event_name == 'issue_comment'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        COMMENT_ID="${{ steps.check-trigger.outputs.comment_id }}"
        REPO="${{ github.repository }}"

        curl -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
          -d '{"content":"eyes"}'

        echo "Added eyes emoji reaction to comment #$COMMENT_ID"

    - name: Post initial cooking message
      id: cooking-message
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        ISSUE_NUMBER="${{ github.event.issue.number }}"
        REPO="${{ github.repository }}"

        echo "Cleaning up old cooking messages..."
        curl -s \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
          | jq -r '.[] | select(.body | contains("I'\''m cooking")) | .id' \
          | while read comment_id; do
              echo "Deleting old cooking message #$comment_id"
              curl -s -X DELETE \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/issues/comments/$comment_id"
            done

        COOKING_MESSAGE="<img src=\"https://raw.githubusercontent.com/inference-gateway/infer-action/main/assets/cooking.gif\" width=\"100\" height=\"100\" alt=\"Cooking\" />

        I'm cooking...will get back to you soon..."

        COMMENT_BODY=$(jq -n \
          --arg body "$COOKING_MESSAGE" \
          '{body: $body}')

        COMMENT_RESPONSE=$(curl -sf -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
          -d "$COMMENT_BODY") || {
          echo "Failed to post cooking comment to issue #$ISSUE_NUMBER" >&2
          exit 1
        }

        COOKING_COMMENT_ID=$(echo "$COMMENT_RESPONSE" | jq -r '.id // empty')
        if [[ -z "$COOKING_COMMENT_ID" ]]; then
          echo "Failed to parse cooking_comment_id from response" >&2
          echo "Response was: $COMMENT_RESPONSE" >&2
          exit 1
        fi
        echo "cooking_comment_id=$COOKING_COMMENT_ID" >> $GITHUB_OUTPUT
        echo "Posted cooking message to issue #$ISSUE_NUMBER (comment #$COOKING_COMMENT_ID)"

    - name: Install Infer CLI
      id: install-cli
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        curl -fsSL https://raw.githubusercontent.com/inference-gateway/cli/main/install.sh | bash -s -- ${VERSION:+--version $VERSION}
        infer version

    - name: Initialize Infer CLI
      id: init-cli
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      run: |
        infer init --overwrite

    - name: Install Infer skills
      id: install-skills
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.skills != ''
      shell: bash
      run: |
        set -e

        SKILLS_INPUT=$(cat <<'SKILLS_EOF'
        ${{ inputs.skills }}
        SKILLS_EOF
        )

        FILTERED=$(printf '%s\n' "$SKILLS_INPUT" \
          | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
          | grep -Ev '^([[:space:]]*$|#)' || true)

        if [[ -z "$FILTERED" ]]; then
          echo "No skills to install (input was empty after filtering comments and blanks)."
          exit 0
        fi

        while IFS= read -r entry; do
          [[ -z "$entry" ]] && continue
          echo "Installing skill: ${entry}"
          infer skills install "$entry" --user --overwrite
        done <<< "$FILTERED"

        echo ""
        echo "Discovered skills after install:"
        infer skills list

        echo "INFER_AGENT_SKILLS_ENABLED=true" >> $GITHUB_ENV

    - name: Configure Git
      id: configure-git
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      run: |
        # TODO - use github app ID
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        echo "Git configured for commits"

    - name: Run Infer agent
      id: run-agent
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      env:
        INFER_AGENT_MODEL: ${{ steps.check-trigger.outputs.model_override || inputs.model }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GOOGLE_API_KEY: ${{ inputs.google-api-key }}
        DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        MISTRAL_API_KEY: ${{ inputs.mistral-api-key }}
        CLOUDFLARE_API_KEY: ${{ inputs.cloudflare-api-key }}
        OLLAMA_API_KEY: ${{ inputs.ollama-api-key }}
        OLLAMA_CLOUD_API_KEY: ${{ inputs.ollama-cloud-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        if [[ "${{ inputs.enable-git-operations }}" == "true" ]]; then
          export INFER_TOOLS_BASH_WHITELIST_COMMANDS="gh,git,${{ inputs.bash-whitelist-commands }}"
          export INFER_TOOLS_BASH_WHITELIST_PATTERNS="^gh .*,^git .*,${{ inputs.bash-whitelist-patterns }}"
        else
          export INFER_TOOLS_BASH_WHITELIST_COMMANDS="${{ inputs.bash-whitelist-commands }}"
          export INFER_TOOLS_BASH_WHITELIST_PATTERNS="${{ inputs.bash-whitelist-patterns }}"
        fi

        ISSUE_TITLE=$(cat <<'ISSUE_TITLE_EOF'
        ${{ github.event.issue.title }}
        ISSUE_TITLE_EOF
        )
        ISSUE_BODY=$(cat <<'ISSUE_BODY_EOF'
        ${{ github.event.issue.body }}
        ISSUE_BODY_EOF
        )
        ISSUE_NUMBER="${{ github.event.issue.number }}"
        REPO="${{ github.repository }}"
        COOKING_COMMENT_ID="${{ steps.cooking-message.outputs.cooking_comment_id }}"

        # Build the system prompt with GitHub integration instructions
        SYSTEM_PROMPT=$(cat <<-SYSEOF
        # GitHub Issue Agent

        You are running in CI on issue #${ISSUE_NUMBER} in ${REPO}.

        ## REQUIRED: First action - publish your plan

        Before any other tool call, post your todo list to the existing status comment (id ${COOKING_COMMENT_ID}) using the Github tool. This is mandatory:

          Github(resource="update_comment", repo="${REPO}", comment_id=${COOKING_COMMENT_ID}, comment_body="<your plan as a markdown checklist>")

        The \`repo\` parameter is always "owner/repo" (e.g. "${REPO}"), never just the org.

        Format the body as a checklist:
          - [ ] First step
          - [ ] Second step
          - [ ] ...

        After each significant step, re-call update_comment with the same comment_id, marking completed items \`[x]\`. When TodoWrite changes, mirror the change to the issue comment in the same turn - TodoWrite is private; the issue comment is what the user sees.

        ## One comment per run

        There is exactly one bot comment per workflow run: the one with id ${COOKING_COMMENT_ID}. Do not create new issue comments. Do not call \`Github(resource="create_comment", ...)\` or any equivalent. If you need to communicate something, update the existing comment.

        ## Code changes

        Branching:
          - On \`main\`/\`master\`: create \`fix/issue-${ISSUE_NUMBER}\`, push, open a PR targeting \`main\` via:
            Github(resource="create_pull_request", repo="${REPO}", title="...", body="Resolves #${ISSUE_NUMBER}", head="fix/issue-${ISSUE_NUMBER}", base="main")
          - On any other branch: commit and push to the current branch. Do not create a PR.

        Commit messages and PR titles follow Conventional Commits: \`type(scope): description\` (feat, fix, docs, style, refactor, test, chore).

        ## Output

        End with a summary of what changed and either the PR URL (if you opened one) or the branch name (if you pushed to an existing branch).

        ## Environment

        - \`gh\` CLI is authenticated via GITHUB_TOKEN.
        - Full file access to the checkout.

        SYSEOF
        )

        if [[ -n "${{ inputs.custom-instructions }}" ]]; then
          SYSTEM_PROMPT=$(cat <<-ENDPROMPT
        $SYSTEM_PROMPT

        ## Additional Instructions

        ${{ inputs.custom-instructions }}
        ENDPROMPT
        )
        fi

        export INFER_AGENT_SYSTEM_PROMPT="$SYSTEM_PROMPT"

        TASK=$(cat <<-END
        Resolve the following GitHub issue:

        Issue #$ISSUE_NUMBER: $ISSUE_TITLE

        $ISSUE_BODY
        END
        )

        echo "=========================================="
        echo "SYSTEM PROMPT:"
        echo "=========================================="
        echo "$SYSTEM_PROMPT"
        echo "=========================================="
        echo ""
        echo "Running agent with task:"
        echo "$TASK"
        echo "---"

        infer agent -m "$INFER_AGENT_MODEL" "$TASK" 2>&1 | tee /tmp/agent-output.txt || EXIT_CODE=$?
        EXIT_CODE=${EXIT_CODE:-0}

        # Extract failed tool calls. Two shapes appear in the stream:
        #   {"role":"tool","content":"Tool execution failed: <err>",...}  (envelope-level failure)
        #   {"role":"tool","content":"Result of tool call: {\"tool_name\":...,\"success\":false,\"error\":...}"}  (dispatched but failed)
        echo ""
        echo "=========================================="
        echo "FAILED TOOL CALLS:"
        echo "=========================================="
        jq -R -r '
          fromjson? | select(.role == "tool") |
          if (.content | startswith("Tool execution failed:")) then
            "- **(unknown tool)**: \(.content | sub("^Tool execution failed: "; ""))"
          else
            (.content | sub("^Result of tool call: "; "") | fromjson?) as $inner |
            if ($inner.success == false) then
              "- **\($inner.tool_name // "unknown")**: \($inner.error // $inner.message // "unknown error")"
            else empty end
          end
        ' /tmp/agent-output.txt > /tmp/failed-tool-calls.txt 2>/dev/null || true

        FAILED_COUNT=0
        if [[ -s /tmp/failed-tool-calls.txt ]]; then
          FAILED_COUNT=$(wc -l < /tmp/failed-tool-calls.txt | tr -d ' ')
          cat /tmp/failed-tool-calls.txt
        else
          echo "No failed tool calls detected"
        fi
        echo "=========================================="
        echo "Detected $FAILED_COUNT failed tool call(s)"

        echo "failed-count=$FAILED_COUNT" >> $GITHUB_OUTPUT
        echo "exit-code=$EXIT_CODE" >> $GITHUB_OUTPUT

        if [[ $EXIT_CODE -eq 0 ]]; then
          echo "result=✅ Agent completed successfully" >> $GITHUB_OUTPUT
          echo "✅ Agent completed successfully"
        else
          echo "result=❌ Agent failed with exit code $EXIT_CODE" >> $GITHUB_OUTPUT
          echo "❌ Agent failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    - name: Post results
      if: steps.check-trigger.outputs.triggered == 'true' && always()
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -u
        ISSUE_NUMBER="${{ github.event.issue.number }}"
        REPO="${{ github.repository }}"
        EXIT_CODE="${{ steps.run-agent.outputs.exit-code }}"
        COOKING_COMMENT_ID="${{ steps.cooking-message.outputs.cooking_comment_id }}"
        WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        MODEL_USED="${{ steps.check-trigger.outputs.model_override }}"
        if [[ -z "$MODEL_USED" ]]; then
          MODEL_USED="${{ inputs.model }}"
        fi

        if [[ "$EXIT_CODE" == "0" ]]; then
          STATUS_ICON="✅"
          STATUS_TEXT="Success"
        else
          STATUS_ICON="❌"
          STATUS_TEXT="Failed"
        fi

        AGENT_OUTPUT=""
        if [[ -f /tmp/agent-output.txt ]]; then
          # Truncate to last 40,000 chars to stay safely under GitHub's 65,536 comment limit.
          AGENT_OUTPUT=$(tail -c 40000 /tmp/agent-output.txt)
        fi

        FAILED_COUNT=0
        if [[ -s /tmp/failed-tool-calls.txt ]]; then
          FAILED_COUNT=$(wc -l < /tmp/failed-tool-calls.txt | tr -d ' ')
        fi

        # Build the structured footer in a temp file. Sequential echos avoid
        # shell-quoting headaches with markdown fences and emoji.
        FOOTER_FILE=$(mktemp)
        {
          echo "---"
          echo ""
          echo "## $STATUS_ICON Infer Result: $STATUS_TEXT"
          echo ""
          echo "**Model:** \`$MODEL_USED\` · **Exit Code:** \`$EXIT_CODE\` · [View Job]($WORKFLOW_URL)"
          echo ""

          if [[ "$FAILED_COUNT" -gt 0 ]]; then
            echo "<details><summary>⚠️ $FAILED_COUNT failed tool call(s)</summary>"
            echo ""
            cat /tmp/failed-tool-calls.txt
            echo ""
            echo "</details>"
            echo ""
          fi

          echo "<details><summary>Agent output (tail)</summary>"
          echo ""
          # 4 backticks so any \`\`\` inside the agent output doesn't close the fence.
          echo '````'
          printf '%s\n' "$AGENT_OUTPUT"
          echo '````'
          echo ""
          echo "</details>"
          echo ""
          echo "*Triggered by ${{ github.actor }} · [Infer Action](https://github.com/inference-gateway/infer-action)*"
        } > "$FOOTER_FILE"

        FOOTER=$(cat "$FOOTER_FILE")

        # Mirror to the GitHub Actions job summary tab.
        cat "$FOOTER_FILE" >> "$GITHUB_STEP_SUMMARY"

        # Edit the cooking comment in place: GET existing body, append footer, PATCH.
        PATCHED=0
        if [[ -n "$COOKING_COMMENT_ID" ]]; then
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/issues/comments/$COOKING_COMMENT_ID" \
            | jq -r '.body // ""') || EXISTING=""

          if [[ -n "$EXISTING" ]]; then
            NEW_BODY="${EXISTING}"$'\n\n'"${FOOTER}"
          else
            NEW_BODY="${FOOTER}"
          fi

          if curl -sf -X PATCH \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/issues/comments/$COOKING_COMMENT_ID" \
              -d "$(jq -n --arg body "$NEW_BODY" '{body: $body}')" > /dev/null; then
            echo "Updated comment #$COOKING_COMMENT_ID on issue #$ISSUE_NUMBER"
            PATCHED=1
          else
            echo "PATCH failed for comment #$COOKING_COMMENT_ID, falling back to POST"
          fi
        fi

        if [[ "$PATCHED" -eq 0 ]]; then
          if curl -sf -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
              -d "$(jq -n --arg body "$FOOTER" '{body: $body}')" > /dev/null; then
            echo "Posted fallback comment to issue #$ISSUE_NUMBER"
          else
            echo "Fallback POST also failed; result is only in the workflow summary" >&2
          fi
        fi

        rm -f "$FOOTER_FILE"

    - name: Cleanup
      if: steps.check-trigger.outputs.triggered == 'true' && always()
      shell: bash
      run: |
        rm -f /tmp/agent-output.txt /tmp/failed-tool-calls.txt

        echo "Cleanup completed"
