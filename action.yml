name: "Infer Agent Action"
description: "Run Infer CLI agent on GitHub issues with support for multiple AI providers, automatic pull request creation, and progress tracking"
author: "Inference Gateway"

branding:
  icon: "cpu"
  color: "blue"

inputs:
  github-token:
    description: "GitHub token for posting comments and accessing API"
    required: true

  trigger-phrase:
    description: "Phrase to trigger the agent (e.g., @infer)"
    required: false
    default: "@infer"

  model:
    description: "Model to use (e.g., anthropic/claude-sonnet-4, openai/gpt-4, google/gemini-pro)"
    required: true

  version:
    description: "Infer CLI version to install (default: v0.112.3)"
    required: false
    default: "v0.112.3"

  anthropic-api-key:
    description: "Anthropic API key (required if using Anthropic models)"
    required: false

  openai-api-key:
    description: "OpenAI API key (required if using OpenAI models)"
    required: false

  google-api-key:
    description: "Google API key (required if using Google/Gemini models)"
    required: false

  deepseek-api-key:
    description: "DeepSeek API key (required if using DeepSeek models)"
    required: false

  groq-api-key:
    description: "Groq API key (required if using Groq models)"
    required: false

  mistral-api-key:
    description: "Mistral API key (required if using Mistral models)"
    required: false

  cloudflare-api-key:
    description: "Cloudflare API key (required if using Cloudflare models)"
    required: false

  cohere-api-key:
    description: "Cohere API key (required if using Cohere models)"
    required: false

  ollama-api-key:
    description: "Ollama API key (required if using Ollama)"
    required: false

  ollama-cloud-api-key:
    description: "Ollama Cloud API key (required if using Ollama Cloud)"
    required: false

  max-turns:
    description: "Maximum number of agent iterations (default: 50)"
    required: false
    default: "50"

  custom-instructions:
    description: "Custom instructions to append to the default agent instructions (which include plan creation, progress tracking, file changes, and PR workflow)"
    required: false
    default: ""

  bash-whitelist-commands:
    description: 'Comma-separated list of bash commands to whitelist (e.g., "npm,yarn,pnpm"). These are added to the default whitelist.'
    required: false
    default: ""

  bash-whitelist-patterns:
    description: 'Comma-separated list of regex patterns to whitelist bash commands (e.g., "^npm .*,^yarn .*"). These are added to the default patterns.'
    required: false
    default: ""

  enable-git-operations:
    description: "Enable git operations (checkout, add, commit, push). Default: true. Set to false if you want the agent to only post comments without creating PRs."
    required: false
    default: "true"

  skills:
    description: |
      Newline-separated list of Infer skills to install before the agent runs.
      Each entry is passed to `infer skills install`. Lines starting with `#` are
      treated as comments. When non-empty, skills are auto-enabled for the agent
      (INFER_AGENT_SKILLS_ENABLED=true).

      Accepted entry forms (per `infer skills install --help`):
        - Bare skill name:    maintainer
            -> https://github.com/inference-gateway/skills/tree/main/skills/maintainer
        - <org>/<skill> pair: acme/internal-comms
            -> https://github.com/acme/skills/tree/main/skills/internal-comms
        - Full GitHub URL:    https://github.com/anthropics/skills/tree/main/skills/pdf

      Examples:
        skills: maintainer

        skills: |
          maintainer
          acme/internal-comms

        skills: |
          # first-party
          maintainer
          # custom layout / pinned branch
          https://github.com/my-org/agent-bundles/tree/v1.2/skills/triage
    required: false
    default: ""

  use-mock-agent:
    description: |
      Use the bundled mock agent instead of installing and running the real Infer CLI.
      Useful for dogfooding the action against a real GitHub issue without burning
      provider tokens - exercises the runner, ticker, comment splicing, and auto-PR
      paths end-to-end. Skips the CLI install, init, and skills steps.
    required: false
    default: "false"

  mock-agent-scenario:
    description: |
      Which mock scenario to run when use-mock-agent is true. One of:
        - happy      Three TodoWrite passes + Read + a commit on a fix/ branch (exercises auto-PR)
        - failures   Happy path with interspersed envelope and inner tool-call failures
        - no-todos   Agent does work but never calls TodoWrite
        - empty      Agent exits immediately with no tool calls
    required: false
    default: "happy"

outputs:
  result:
    description: "Result of the agent execution"
    value: ${{ steps.run-agent.outputs.result }}

  exit-code:
    description: "Exit code from agent command"
    value: ${{ steps.run-agent.outputs.exit-code }}

  failed-tool-calls-count:
    description: "Number of failed tool calls detected in agent output"
    value: ${{ steps.post-results.outputs.failed-count }}

runs:
  using: "composite"
  steps:
    - name: Check trigger conditions
      id: check-trigger
      shell: bash
      run: |
        TRIGGERED=false
        TRIGGER_PHRASE="${{ inputs.trigger-phrase }}"
        MODEL_OVERRIDE=""

        extract_model_override() {
          local text="$1"
          if [[ "$text" =~ /model[[:space:]]+([a-zA-Z0-9/_.:-]+) ]]; then
            echo "${BASH_REMATCH[1]}"
          fi
        }

        if [[ "${{ github.event_name }}" == "issues" ]]; then
          ISSUE_TITLE=$(cat <<'ISSUE_TITLE_EOF'
        ${{ github.event.issue.title }}
        ISSUE_TITLE_EOF
        )
          ISSUE_BODY=$(cat <<'ISSUE_BODY_EOF'
        ${{ github.event.issue.body }}
        ISSUE_BODY_EOF
        )

          if [[ "$ISSUE_TITLE" == *"$TRIGGER_PHRASE"* ]] || [[ "$ISSUE_BODY" == *"$TRIGGER_PHRASE"* ]]; then
            TRIGGERED=true
            MODEL_OVERRIDE=$(extract_model_override "$ISSUE_BODY")
            if [[ -n "$MODEL_OVERRIDE" ]]; then
              echo "Detected model override from issue body: $MODEL_OVERRIDE"
            fi
          fi
        fi

        if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
          COMMENT_AUTHOR="${{ github.event.comment.user.login }}"

          if [[ "$COMMENT_AUTHOR" == *"[bot]" ]] || [[ "${{ github.event.comment.user.type }}" == "Bot" ]]; then
            echo "Comment is from bot user '$COMMENT_AUTHOR'. Skipping to prevent recursion."
            TRIGGERED=false
          else
            COMMENT_BODY=$(cat <<'COMMENT_BODY_EOF'
        ${{ github.event.comment.body }}
        COMMENT_BODY_EOF
        )
            COMMENT_ID="${{ github.event.comment.id }}"

            if [[ "$COMMENT_BODY" == *"$TRIGGER_PHRASE"* ]]; then
              TRIGGERED=true
              echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT
              MODEL_OVERRIDE=$(extract_model_override "$COMMENT_BODY")
              if [[ -n "$MODEL_OVERRIDE" ]]; then
                echo "Detected model override: $MODEL_OVERRIDE"
              fi
            fi
          fi
        fi

        echo "model_override=$MODEL_OVERRIDE" >> $GITHUB_OUTPUT
        echo "triggered=$TRIGGERED" >> $GITHUB_OUTPUT

        if [[ "$TRIGGERED" == "false" ]]; then
          echo "Trigger phrase '$TRIGGER_PHRASE' not found. Skipping action."
          exit 0
        fi

        echo "Trigger phrase '$TRIGGER_PHRASE' detected. Proceeding with agent execution."

    - name: Add eyes emoji reaction to comment
      if: steps.check-trigger.outputs.triggered == 'true' && github.event_name == 'issue_comment'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        COMMENT_ID="${{ steps.check-trigger.outputs.comment_id }}"
        REPO="${{ github.repository }}"

        curl -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
          -d '{"content":"eyes"}'

        echo "Added eyes emoji reaction to comment #$COMMENT_ID"

    - name: Post initial cooking message
      id: cooking-message
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        ISSUE_NUMBER="${{ github.event.issue.number }}"
        REPO="${{ github.repository }}"

        echo "Cleaning up old cooking messages..."
        curl -s \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
          | jq -r '.[] | select(.body | contains("I'\''m cooking")) | .id' \
          | while read comment_id; do
              echo "Deleting old cooking message #$comment_id"
              curl -s -X DELETE \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/issues/comments/$comment_id"
            done

        COOKING_MESSAGE="<img src=\"https://raw.githubusercontent.com/inference-gateway/infer-action/main/assets/cooking.gif\" width=\"100\" height=\"100\" alt=\"Cooking\" />

        I'm cooking...will get back to you soon..."

        COMMENT_BODY=$(jq -n \
          --arg body "$COOKING_MESSAGE" \
          '{body: $body}')

        COMMENT_RESPONSE=$(curl -sf -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
          -d "$COMMENT_BODY") || {
          echo "Failed to post cooking comment to issue #$ISSUE_NUMBER" >&2
          exit 1
        }

        COOKING_COMMENT_ID=$(echo "$COMMENT_RESPONSE" | jq -r '.id // empty')
        if [[ -z "$COOKING_COMMENT_ID" ]]; then
          echo "Failed to parse cooking_comment_id from response" >&2
          echo "Response was: $COMMENT_RESPONSE" >&2
          exit 1
        fi
        echo "cooking_comment_id=$COOKING_COMMENT_ID" >> $GITHUB_OUTPUT
        echo "Posted cooking message to issue #$ISSUE_NUMBER (comment #$COOKING_COMMENT_ID)"

    - name: Install Infer CLI
      id: install-cli
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.use-mock-agent != 'true'
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        curl -fsSL https://raw.githubusercontent.com/inference-gateway/cli/main/install.sh | bash -s -- ${VERSION:+--version $VERSION}
        infer version

    - name: Initialize Infer CLI
      id: init-cli
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.use-mock-agent != 'true'
      shell: bash
      run: |
        infer init --overwrite

    - name: Install Infer skills
      id: install-skills
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.use-mock-agent != 'true' && inputs.skills != ''
      shell: bash
      run: |
        set -e

        SKILLS_INPUT=$(cat <<'SKILLS_EOF'
        ${{ inputs.skills }}
        SKILLS_EOF
        )

        FILTERED=$(printf '%s\n' "$SKILLS_INPUT" \
          | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
          | grep -Ev '^([[:space:]]*$|#)' || true)

        if [[ -z "$FILTERED" ]]; then
          echo "No skills to install (input was empty after filtering comments and blanks)."
          exit 0
        fi

        while IFS= read -r entry; do
          [[ -z "$entry" ]] && continue
          echo "Installing skill: ${entry}"
          infer skills install "$entry" --user --overwrite
        done <<< "$FILTERED"

        echo ""
        echo "Discovered skills after install:"
        infer skills list

        echo "INFER_AGENT_SKILLS_ENABLED=true" >> $GITHUB_ENV

    - name: Configure Git
      id: configure-git
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      run: |
        # TODO - use github app ID
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        echo "Git configured for commits"

    - name: Setup Node.js for action runtime
      if: steps.check-trigger.outputs.triggered == 'true'
      uses: actions/setup-node@v6.0.0
      with:
        node-version: "22"

    - name: Run Infer agent
      id: run-agent
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      env:
        # Provider keys - inherited by the spawned `infer` process via process.env.
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GOOGLE_API_KEY: ${{ inputs.google-api-key }}
        DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        MISTRAL_API_KEY: ${{ inputs.mistral-api-key }}
        CLOUDFLARE_API_KEY: ${{ inputs.cloudflare-api-key }}
        OLLAMA_API_KEY: ${{ inputs.ollama-api-key }}
        OLLAMA_CLOUD_API_KEY: ${{ inputs.ollama-cloud-api-key }}
        # Runner config.
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INFER_AGENT_MODEL: ${{ steps.check-trigger.outputs.model_override || inputs.model }}
        INFER_REPO: ${{ github.repository }}
        INFER_ISSUE_NUMBER: ${{ github.event.issue.number }}
        INFER_ISSUE_TITLE: ${{ github.event.issue.title }}
        INFER_ISSUE_BODY: ${{ github.event.issue.body }}
        INFER_COOKING_COMMENT_ID: ${{ steps.cooking-message.outputs.cooking_comment_id }}
        INFER_CUSTOM_INSTRUCTIONS: ${{ inputs.custom-instructions }}
        INFER_ENABLE_GIT_OPERATIONS: ${{ inputs.enable-git-operations }}
        INFER_BASH_WHITELIST_COMMANDS: ${{ inputs.bash-whitelist-commands }}
        INFER_BASH_WHITELIST_PATTERNS: ${{ inputs.bash-whitelist-patterns }}
        # Mock-agent toggle. When use-mock-agent=true, runner spawns the bundled
        # fixture instead of `infer`; MOCK_* envs are read by the fixture only.
        INFER_BIN: ${{ inputs.use-mock-agent == 'true' && format('{0}/__tests__/fixtures/mock-agent.mjs', github.action_path) || '' }}
        MOCK_SCENARIO: ${{ inputs.mock-agent-scenario }}
        MOCK_TICK_MS: "500"
        MOCK_MAKE_COMMIT: ${{ (inputs.use-mock-agent == 'true' && inputs.mock-agent-scenario == 'happy') && '1' || '0' }}
      run: node "$GITHUB_ACTION_PATH/dist/runner/index.js"

    - name: Post results
      id: post-results
      if: steps.check-trigger.outputs.triggered == 'true' && always()
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INFER_REPO: ${{ github.repository }}
        INFER_ISSUE_NUMBER: ${{ github.event.issue.number }}
        INFER_COOKING_COMMENT_ID: ${{ steps.cooking-message.outputs.cooking_comment_id }}
        INFER_MODEL_USED: ${{ steps.check-trigger.outputs.model_override || inputs.model }}
        INFER_EXIT_CODE: ${{ steps.run-agent.outputs.exit-code }}
        INFER_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        INFER_ACTOR: ${{ github.actor }}
      run: node "$GITHUB_ACTION_PATH/dist/post-results/index.js"

    - name: Cleanup
      if: steps.check-trigger.outputs.triggered == 'true' && always()
      shell: bash
      run: |
        rm -f /tmp/agent-output.txt /tmp/failed-tool-calls.txt

        echo "Cleanup completed"
