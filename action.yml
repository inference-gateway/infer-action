name: "Infer Agent Action"
description: "Run Infer CLI agent on GitHub issues with support for multiple AI providers, automatic pull request creation, and progress tracking"
author: "Inference Gateway"

branding:
  icon: "cpu"
  color: "blue"

inputs:
  github-token:
    description: "GitHub token for posting comments and accessing API"
    required: true

  github-app-slug:
    description: |
      Slug of the GitHub App whose bot identity should author the agent's
      commits (e.g. "infer-bot"). When set, commits are attributed to
      "<slug>[bot]" and the numeric id is resolved via GET /users/{slug}[bot]
      (which works with an App installation token, unlike GET /user). Falls
      back to github-actions[bot] when empty or if the lookup fails.
    required: false
    default: ""

  trigger-phrase:
    description: "Phrase to trigger the agent (e.g., @infer)"
    required: false
    default: "@infer"

  direct-prompt:
    description: |
      Free-text task to run directly, bypassing issue/comment trigger
      detection. When non-empty, the agent runs against this text instead of
      an issue or comment body, so the action works under `workflow_dispatch`
      (or any event) with no issue/PR thread required. In this mode the agent
      commits to a new branch and opens a PR (honoring `enable-git-operations`),
      and the result plus PR link are written to the job summary. A `/model`
      override embedded in the text is honored, as in event-driven mode. Leave
      empty (the default) for normal issue/comment-triggered behavior.
    required: false
    default: ""

  model:
    description: "Model to use (e.g., anthropic/claude-opus-4-8, openai/gpt-5.5, google/gemini-3.5-pro). In Claude Code subscription mode it must be a bare Claude id (e.g., claude-sonnet-4-5-20250929)."
    required: true

  version:
    description: |
      Infer CLI version to install (default: v0.128.0). Versions below
      v0.125.0 do not support the native reminders file, so the action's
      periodic reminders are silently disabled on older CLIs.
    required: false
    default: "v0.128.0"

  anthropic-api-key:
    description: "Anthropic API key (required if using Anthropic models)"
    required: false

  openai-api-key:
    description: "OpenAI API key (required if using OpenAI models)"
    required: false

  google-api-key:
    description: "Google API key (required if using Google/Gemini models)"
    required: false

  deepseek-api-key:
    description: "DeepSeek API key (required if using DeepSeek models)"
    required: false

  groq-api-key:
    description: "Groq API key (required if using Groq models)"
    required: false

  mistral-api-key:
    description: "Mistral API key (required if using Mistral models)"
    required: false

  cloudflare-api-key:
    description: "Cloudflare API key (required if using Cloudflare models)"
    required: false

  cohere-api-key:
    description: "Cohere API key (required if using Cohere models)"
    required: false

  ollama-api-key:
    description: "Ollama API key (required if using Ollama)"
    required: false

  ollama-cloud-api-key:
    description: "Ollama Cloud API key (required if using Ollama Cloud)"
    required: false

  moonshot-api-key:
    description: "Moonshot API key (required if using Moonshot models)"
    required: false

  minimax-api-key:
    description: "MiniMax API key (required if using MiniMax models)"
    required: false

  use-claude-code-subscription:
    description: "Run the agent via the Infer CLI's Claude Code mode, billed against a Claude Max/Pro subscription instead of a provider API key. Installs the `claude` CLI and sets INFER_CLAUDE_CODE_ENABLED=true / INFER_GATEWAY_RUN=false."
    required: false
    default: "false"

  claude-code-oauth-token:
    description: "Claude subscription OAuth token (CLAUDE_CODE_OAUTH_TOKEN) minted by `claude setup-token`. Required when use-claude-code-subscription is true."
    required: false
    default: ""

  claude-code-cli-version:
    description: "Version of the @anthropic-ai/claude-code npm package to install for Claude Code mode."
    required: false
    default: "2.1.187"

  claude-code-max-output-tokens:
    description: "Optional max output tokens for Claude Code mode (INFER_CLAUDE_CODE_MAX_OUTPUT_TOKENS). Empty uses the CLI default."
    required: false
    default: ""

  claude-code-thinking-budget:
    description: "Optional extended-thinking token budget for Claude Code mode (INFER_CLAUDE_CODE_THINKING_BUDGET). Empty uses the CLI default."
    required: false
    default: ""

  max-turns:
    description: "Maximum number of agent iterations (default: 150)"
    required: false
    default: "150"

  custom-instructions:
    description: "Custom instructions to append to the default agent instructions (which include plan creation, progress tracking, file changes, and PR workflow)"
    required: false
    default: ""

  system-prompt-issue:
    description: |
      Override the bundled system prompt for issue triggers (issue opened/edited
      or comments on real issues). Substitutes `{{issueNumber}}`. Leave empty to
      use the default at src/prompts/system-issue.md in the action repo.
    required: false
    default: ""

  system-prompt-pr:
    description: |
      Override the bundled system prompt for PR-comment triggers on same-repo
      PRs. Substitutes `{{prNumber}}`, `{{headRef}}`. Leave empty to use the
      default at src/prompts/system-pr.md in the action repo.
    required: false
    default: ""

  system-prompt-pr-fork:
    description: |
      Override the bundled system prompt for PR-comment triggers on fork PRs
      (view-only). Substitutes `{{prNumber}}`, `{{headRef}}`,
      `{{headRepoFullName}}`, `{{baseRef}}`. Leave empty to use the default.
    required: false
    default: ""

  system-prompt-direct:
    description: |
      Override the bundled system prompt for direct-prompt
      (`workflow_dispatch`) runs. No variables. Leave empty to use the default
      at src/prompts/system-direct.md in the action repo.
    required: false
    default: ""

  reminder-issue:
    description: |
      Override the periodic system-reminder text for issue triggers. No
      variables. Leave empty to use the default at src/prompts/reminder-issue.md.
    required: false
    default: ""

  reminder-pr:
    description: |
      Override the periodic system-reminder text for same-repo PR triggers.
      Substitutes `{{prNumber}}`, `{{headRef}}`. Leave empty to use the default.
    required: false
    default: ""

  reminder-pr-fork:
    description: |
      Override the periodic system-reminder text for fork PR triggers.
      Substitutes `{{baseRef}}`. Leave empty to use the default.
    required: false
    default: ""

  reminder-direct:
    description: |
      Override the periodic system-reminder text for direct-prompt runs. No
      variables. Leave empty to use the default at
      src/prompts/reminder-direct.md.
    required: false
    default: ""

  task-issue:
    description: |
      Override the bundled task template for issue triggers. Substitutes
      `{{issueNumber}}`, `{{issueTitle}}`, `{{issueBody}}`,
      `{{triggeringCommentSection}}`. Leave empty to use the default.
    required: false
    default: ""

  task-pr:
    description: |
      Override the bundled task template for PR-comment triggers. Substitutes
      `{{prNumber}}`, `{{prTitle}}`, `{{headRef}}`, `{{baseRef}}`,
      `{{forkNotice}}`, `{{prBody}}`, `{{triggerSection}}`,
      `{{otherCommentsSection}}`, `{{diffStatSection}}`. Leave empty to use the
      default.
    required: false
    default: ""

  task-direct:
    description: |
      Override the bundled task template for direct-prompt runs. Substitutes
      `{{prompt}}`. Leave empty to use the default.
    required: false
    default: ""

  bash-allow-append:
    description: |
      Comma/newline-separated Go regex entries appended to the Infer CLI's read-only bash
      allow-list in every agent mode (maps to INFER_TOOLS_BASH_ALLOW_APPEND). The CLI owns the
      read-only baseline - file reads, read-only git/gh, and `gh project` (list/view/item-list/
      field-list) - so you no longer pass those. When git operations are enabled the action
      additionally appends the writes its PR workflow needs (git add/commit/push/checkout/
      switch/fetch and `gh pr create`; never `gh pr merge`/`close`/`edit`/`review`). Use this
      input to add project tooling. Each entry is anchored to the WHOLE command, so include
      arguments explicitly, e.g. "npm( .*)?,pnpm( .*)?,go test( .*)?". To *replace* the baseline
      (rather than append) configure the CLI's .infer/config.yaml directly.
    required: false
    default: ""

  web-fetch-domains:
    description: |
      Comma-separated list of domains the WebFetch tool may fetch from. The action passes this
      to the CLI as the INFER_TOOLS_WEB_FETCH_ALLOWED_DOMAINS env var (which maps to
      tools.web_fetch.allowed_domains and takes precedence over the config file), REPLACING the
      CLI default. Leave empty to use the action default
      "github.com,raw.githubusercontent.com,api.github.com".
    required: false
    default: ""

  memory-repo:
    description: |
      Git remote URL backing the agent's persistent cross-run memory (ssh or https, e.g.
      "git@github.com:my-org/agent-memory.git" or "https://github.com/my-org/agent-memory").
      When set, the action enables the Infer CLI's memory git backend (maps to
      INFER_MEMORY_ENABLED=true, INFER_MEMORY_BACKEND_TYPE=git and
      INFER_MEMORY_BACKEND_GIT_REPO): the CLI pulls memory on run start and commits + pushes
      when a fact changes. Leave empty (the default) to keep the feature off entirely - no
      memory env vars are set, so a consumer's own .infer/memory.yaml is untouched. Requires
      Infer CLI >= v0.127.0. See also memory-deploy-key / memory-token for auth.
    required: false
    default: ""

  memory-branch:
    description: |
      Branch of memory-repo to sync (maps to INFER_MEMORY_BACKEND_GIT_BRANCH). Leave empty to
      use the CLI default ("main"). Only used when memory-repo is set.
    required: false
    default: ""

  memory-sync-on-start:
    description: |
      Whether the CLI pulls the memory repo at run start: "pull" or "off" (maps to
      INFER_MEMORY_BACKEND_GIT_SYNC_ON_START). Leave empty to use the CLI default ("pull").
      Only used when memory-repo is set.
    required: false
    default: ""

  memory-sync-on-finish:
    description: |
      Whether the CLI pushes memory changes at run finish: "push" or "off" (maps to
      INFER_MEMORY_BACKEND_GIT_SYNC_ON_FINISH). Leave empty to use the CLI default ("push").
      Only used when memory-repo is set.
    required: false
    default: ""

  memory-deploy-key:
    description: |
      SSH private key (e.g. a GitHub deploy key with write access) used to authenticate the
      memory-repo remote when it is an ssh URL. Written to ~/.ssh/infer-memory-deploy-key and
      wired via core.sshCommand before the agent runs; removed again in cleanup. Only used
      when memory-repo is an ssh URL.
    required: false
    default: ""

  memory-token:
    description: |
      Token used to authenticate the memory-repo remote when it is an https URL (applied as a
      git insteadOf rewrite scoped to that repo; removed again in cleanup). When memory-repo
      is an https URL on this GitHub instance and neither memory-token nor memory-deploy-key
      is set, the action falls back to github-token - which only works for repos that token
      can write, e.g. a memory branch of the workflow repo itself.
    required: false
    default: ""

  enable-git-operations:
    description: "Enable git operations (checkout, add, commit, push). Default: true. Set to false if you want the agent to only post comments without creating PRs."
    required: false
    default: "true"

  enable-heuristic-redaction:
    description: "Apply regex heuristics to redact unknown token shapes (ghp_*, github_pat_*, sk-*, AIza*, xox[bpoa]-*, and JWTs) from the cooking comment and step summary, on top of the known-value redaction that always runs. May false-positive on legitimate strings. Default: false."
    required: false
    default: "false"

  mirror-agent-logs:
    description: |-
      Mirror the agent's verbose stdout transcript to this step's workflow log.
      When true, every line the agent emits on stdout - tool inputs, outputs,
      file contents, web-fetch payloads - appears in the Actions run log.
      Defaults to false (suppressed); set to true to mirror it. The agent's
      stderr (crashes, panics, stack-traces) is always mirrored so failures
      stay visible, and the /tmp/agent-output.txt file that post-results reads
      for the cooking comment footer is always written - both regardless of
      this setting. A minimal heartbeat (ticker updates, exit code) still
      prints so the step isn't entirely silent. Default: false.
    required: false
    default: "false"

  skills:
    description: |
      Newline-separated list of Infer skills to install before the agent runs.
      Each entry is passed to `infer skills install`. Lines starting with `#` are
      treated as comments. When non-empty, skills are auto-enabled for the agent
      (INFER_AGENT_SKILLS_ENABLED=true).

      Accepted entry forms (per `infer skills install --help`):
        - Bare skill name:    maintainer
            -> https://github.com/inference-gateway/skills/tree/main/skills/maintainer
        - <org>/<skill> pair: acme/internal-comms
            -> https://github.com/acme/skills/tree/main/skills/internal-comms
        - Full GitHub URL:    https://github.com/anthropics/skills/tree/main/skills/pdf

      Examples:
        skills: maintainer

        skills: |
          maintainer
          acme/internal-comms

        skills: |
          # first-party
          maintainer
          # custom layout / pinned branch
          https://github.com/my-org/agent-bundles/tree/v1.2/skills/triage
    required: false
    default: ""

  agents:
    description: |
      Comma/newline-separated list of A2A (Agent-to-Agent) agents to spin up as
      local Docker containers when the agent runs. Each entry is either:

        - A first-party agent name the CLI already knows - `browser-agent`,
          `mock-agent`, `google-calendar-agent`, `documentation-agent`, or
          `n8n-agent`. The CLI fills in the OCI image and localhost URL itself.
        - A `name=oci-image` pair to register a custom image, e.g.
          `my-agent=ghcr.io/my-org/my-agent:latest`.

      Lines starting with `#` are treated as comments. For each entry the action
      runs `infer agents add ... --run --model <model>` (writing the local
      `.infer/agents.yaml`, which is hidden from git), enables it, and turns on
      A2A (`INFER_A2A_ENABLED=true`) so `infer agent` starts the containers and
      exposes them to the model via the A2A tools. Agents default to the same
      `model` as the main run; configure `.infer/agents.yaml` directly for
      per-agent models. Registration is best-effort: an unknown name or a failed
      add logs a warning and is skipped rather than failing the run.

      Docker must be available on the runner (the default `ubuntu-24.04` runner
      has it pre-installed). This is an advanced, experimental feature.

      Examples:
        agents: browser-agent

        agents: |
          browser-agent
          documentation-agent

        agents: |
          # first-party agent
          browser-agent
          # custom image
          my-agent=ghcr.io/my-org/my-agent:latest
    required: false
    default: ""

  debug:
    description: |
      Enable debug-level logging in the Infer CLI and emit diagnostic stream
      events (system reminder injections, conversation compaction triggers)
      on the agent's stdout - visible in this step's workflow log. Hidden by
      default. Turn on when investigating why the agent ignored its system
      prompt or whether reminders are firing.
    required: false
    default: "false"

  compact-auto-at:
    description: |
      Auto-compaction threshold as a percentage of the model's context window.
      When the conversation's input tokens cross this percent, the CLI runs an
      LLM-summarised compaction that drops older turns while preserving the
      first messages. Default 50. Lower to compact earlier (preserves headroom
      at the cost of summarised context), raise to delay summarisation.
      Accepted range 20-100.
    required: false
    default: "50"

  mock-agent-scenario:
    description: |
      Which mock scenario the bundled mock agent runs when dry-run is true. One of:
        - happy           Three TodoWrite passes + Read + a commit on a fix/ branch (exercises PR-link)
        - failures        Happy path with interspersed envelope and inner tool-call failures
        - no-todos        Agent does work but never calls TodoWrite
        - empty           Agent exits immediately with no tool calls
        - incomplete      Agent is cut off mid-plan (stopped-early signal)
        - no-git          Agent edits files but never commits/pushes (salvage from a dirty tree)
        - commit-no-push  Agent commits on the fix branch but never pushes, exits 0 (salvage of unpushed commits)
        - hang            Agent wedges inside compaction and never exits (timeout/cancel path)
    required: false
    default: "happy"

  dry-run:
    description: |
      Plan-only mode for local testing (e.g. with `act`). Forces the bundled
      mock agent (no real CLI install, no provider tokens), and SIMULATES every
      GitHub mutation - comments, the eyes reaction, the cooking comment, comment
      zone updates, spinner clear - printing a `[dry-run] would ...` line instead
      of calling the API. The runner also prints a "DRY RUN" banner with the exact
      SYSTEM/TASK/REMINDER prompts and tool whitelists the agent would receive.
      GitHub READ calls still execute (so you see the real target issue/PR), and
      degrade gracefully when no token is available.
    required: false
    default: "false"

  otel-exporter-otlp-endpoint:
    description: |
      OpenTelemetry OTLP HTTP endpoint for telemetry export
      (e.g. http://localhost:4318). When empty (the default), all OTLP export is
      disabled and the action behaves exactly as before - zero behavior change
      for existing users. Maps to the OTEL_EXPORTER_OTLP_ENDPOINT env var.
    required: false
    default: ""

  otel-exporter-otlp-headers:
    description: |
      Comma-separated key=value headers for the OTLP HTTP requests
      (e.g. "Authorization=Bearer my-token"). These are secret and auto-masked.
      Maps to the OTEL_EXPORTER_OTLP_HEADERS env var.
    required: false
    default: ""

  otel-exporter-otlp-protocol:
    description: |
      OTLP transport protocol. Defaults to "http/json" (JSON encoding over
      HTTP). gRPC is not supported. Only "http/json" is implemented;
      setting this to any other value will be silently ignored and JSON
      will be sent.
      Maps to the OTEL_EXPORTER_OTLP_PROTOCOL env var.
    required: false
    default: "http/json"

  otel-service-name:
    description: |
      Value for the service.name resource attribute on exported telemetry.
      Defaults to "infer-action". Maps to the OTEL_SERVICE_NAME env var.
    required: false
    default: "infer-action"

  otel-resource-attributes:
    description: |
      Extra resource attributes in key=val,key2=val2 format, appended to the
      standard set (service.name, service.version, gen_ai.provider.name,
      cicd.pipeline.*, vcs.repository.*, github.*). Maps to the
      OTEL_RESOURCE_ATTRIBUTES env var.
    required: false
    default: ""

  otel-signals:
    description: |
      Comma-separated list of OTLP signals to export. Defaults to "metrics"
      (the cheapest, highest-value signal). Set to "metrics,traces,logs" to
      enable all three. Traces emit one root span per run; logs emit one ERROR
      record per failed tool call. Maps to the OTEL_SIGNALS env var.
    required: false
    default: "metrics"

  otel-export-timeout-ms:
    description: |
      Timeout in milliseconds for each OTLP HTTP POST request. Defaults to 5000.
      The export is best-effort and never fails the run or blocks the comment.
      Maps to the OTEL_EXPORT_TIMEOUT_MS env var.
    required: false
    default: "5000"

outputs:
  result:
    description: "Result of the agent execution"
    value: ${{ steps.report.outputs.result }}

  exit-code:
    description: "Exit code from agent command (normalised to 0 on a job-timeout stop, where the work is recovered into a draft PR)"
    value: ${{ steps.report.outputs.exit-code }}

  pr-url:
    description: "URL of the pull request the agent opened on its branch, or the draft PR the salvage step opened when an interrupted run left work unpushed (empty if none)"
    value: ${{ steps.report.outputs.pr-url }}

  run-duration-ms:
    description: "Wall-clock duration of the agent run in milliseconds (0 if unavailable)"
    value: ${{ steps.report.outputs.run-duration-ms }}

  stopped-early:
    description: "true if the agent stopped before finishing its plan (unfinished todos, uncommitted work left behind, or a job-timeout stop)"
    value: ${{ steps.report.outputs.stopped-early }}

  timed-out:
    description: "true if the agent was stopped because the job hit its timeout-minutes before it finished (work is recovered into a draft PR; reported as ⚠️ stopped early, not a failure)"
    value: ${{ steps.report.outputs.timed-out }}

  failed-tool-calls-count:
    description: "Number of failed tool calls detected in agent output"
    value: ${{ steps.report.outputs.failed-count }}

  total-tool-calls-count:
    description: "Total number of tool calls made by the agent"
    value: ${{ steps.report.outputs.total-count }}

runs:
  using: "composite"
  steps:
    - name: Check trigger conditions
      id: check-trigger
      shell: bash
      run: |
        TRIGGERED=false
        TRIGGER_PHRASE="${{ inputs.trigger-phrase }}"
        MODEL_OVERRIDE=""

        regex_escape() {
          local str="$1"
          printf '%s' "$str" | sed 's/[.[\*^$+?{|()\\]/\\&/g'
        }
        ESCAPED_PHRASE=$(regex_escape "$TRIGGER_PHRASE")
        WHOLE_WORD_PATTERN="(^|[^[:alnum:]_])${ESCAPED_PHRASE}([^[:alnum:]_]|$)"

        extract_model_override() {
          local text="$1"
          if [[ "$text" =~ /model[[:space:]]+([a-zA-Z0-9/_.:-]+) ]]; then
            echo "${BASH_REMATCH[1]}"
          fi
        }

        DIRECT_PROMPT=$(cat <<'DIRECT_PROMPT_EOF'
        ${{ inputs.direct-prompt }}
        DIRECT_PROMPT_EOF
        )
        if [[ -n "$(printf '%s' "$DIRECT_PROMPT" | tr -d '[:space:]')" ]]; then
          echo "Direct prompt provided; running in direct (workflow_dispatch) mode."
          MODEL_OVERRIDE=$(extract_model_override "$DIRECT_PROMPT")
          if [[ -n "$MODEL_OVERRIDE" ]]; then
            echo "Detected model override from direct prompt: $MODEL_OVERRIDE"
          fi
          echo "context_kind=direct" >> $GITHUB_OUTPUT
          echo "model_override=$MODEL_OVERRIDE" >> $GITHUB_OUTPUT
          echo "triggered=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [[ "${{ github.event_name }}" == "issues" ]]; then
          ISSUE_TITLE=$(cat <<'ISSUE_TITLE_EOF'
        ${{ github.event.issue.title }}
        ISSUE_TITLE_EOF
        )
          ISSUE_BODY=$(cat <<'ISSUE_BODY_EOF'
        ${{ github.event.issue.body }}
        ISSUE_BODY_EOF
        )

          if [[ "$ISSUE_TITLE" =~ $WHOLE_WORD_PATTERN ]] || [[ "$ISSUE_BODY" =~ $WHOLE_WORD_PATTERN ]]; then
            TRIGGERED=true
            MODEL_OVERRIDE=$(extract_model_override "$ISSUE_BODY")
            if [[ -n "$MODEL_OVERRIDE" ]]; then
              echo "Detected model override from issue body: $MODEL_OVERRIDE"
            fi
          fi
        fi

        if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
          COMMENT_AUTHOR="${{ github.event.comment.user.login }}"

          if [[ "$COMMENT_AUTHOR" == *"[bot]" ]] || [[ "${{ github.event.comment.user.type }}" == "Bot" ]]; then
            echo "Comment is from bot user '$COMMENT_AUTHOR'. Skipping to prevent recursion."
            TRIGGERED=false
          else
            COMMENT_BODY=$(cat <<'COMMENT_BODY_EOF'
        ${{ github.event.comment.body }}
        COMMENT_BODY_EOF
        )
            COMMENT_ID="${{ github.event.comment.id }}"

            if [[ "$COMMENT_BODY" =~ $WHOLE_WORD_PATTERN ]]; then
              TRIGGERED=true
              echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT
              MODEL_OVERRIDE=$(extract_model_override "$COMMENT_BODY")
              if [[ -n "$MODEL_OVERRIDE" ]]; then
                echo "Detected model override: $MODEL_OVERRIDE"
              fi
            fi
          fi
        fi

        CONTEXT_KIND="issue"
        if [[ "${{ github.event_name }}" == "issue_comment" && -n "${{ github.event.issue.pull_request.url }}" ]]; then
          CONTEXT_KIND="pull_request"
        fi

        echo "context_kind=$CONTEXT_KIND" >> $GITHUB_OUTPUT
        echo "model_override=$MODEL_OVERRIDE" >> $GITHUB_OUTPUT
        echo "triggered=$TRIGGERED" >> $GITHUB_OUTPUT

        if [[ "$TRIGGERED" == "false" ]]; then
          echo "Trigger phrase '$TRIGGER_PHRASE' not found. Skipping action."
          exit 0
        fi

        echo "Trigger phrase '$TRIGGER_PHRASE' detected. Proceeding with agent execution."

    - name: Add eyes emoji reaction to comment
      if: steps.check-trigger.outputs.triggered == 'true' && github.event_name == 'issue_comment'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        COMMENT_ID="${{ steps.check-trigger.outputs.comment_id }}"
        REPO="${{ github.repository }}"

        if [[ "$DRY_RUN" == "true" ]]; then
          echo "[dry-run] would add 'eyes' reaction to comment #$COMMENT_ID on $REPO"
          exit 0
        fi

        curl -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
          -d '{"content":"eyes"}'

        echo "Added eyes emoji reaction to comment #$COMMENT_ID"

    - name: Post initial cooking message
      id: cooking-message
      if: steps.check-trigger.outputs.triggered == 'true' && steps.check-trigger.outputs.context_kind != 'direct'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        DRY_RUN: ${{ inputs.dry-run }}
        MODEL: ${{ steps.check-trigger.outputs.model_override || inputs.model }}
      run: |
        ISSUE_NUMBER="${{ github.event.issue.number }}"
        REPO="${{ github.repository }}"

        if [[ "$DRY_RUN" == "true" ]]; then
          PRIOR=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" 2>/dev/null \
            | jq -r '[.[] | select(.body != null and (.body | contains("I'\''m cooking")))] | length' 2>/dev/null || echo 0)
          [[ -z "$PRIOR" || "$PRIOR" == "null" ]] && PRIOR=0
          echo "[dry-run] would delete $PRIOR prior 'I'\''m cooking' comment(s) on issue #$ISSUE_NUMBER"
          echo "[dry-run] would create the 'I'\''m cooking...' comment on issue #$ISSUE_NUMBER (https://github.com/$REPO/issues/$ISSUE_NUMBER)"
          echo "cooking_comment_id=999999999" >> $GITHUB_OUTPUT
          echo "[dry-run] using synthetic cooking_comment_id=999999999 so downstream steps exercise their update paths"
          exit 0
        fi

        echo "Cleaning up old cooking messages..."
        curl -s \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
          | jq -r '.[] | select(.body | contains("I'\''m cooking")) | .id' \
          | while read comment_id; do
              echo "Deleting old cooking message #$comment_id"
              curl -s -X DELETE \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/issues/comments/$comment_id"
            done

        COOKING_MESSAGE="<!-- infer:spinner --><img src=\"https://raw.githubusercontent.com/inference-gateway/infer-action/main/assets/spinner.svg\" width=\"22\" height=\"22\" alt=\"Working\" /><!-- /infer:spinner -->

        **Model:** \`${MODEL}\` · [View Job](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

        I'm cooking...will get back to you soon..."

        COMMENT_BODY=$(jq -n \
          --arg body "$COOKING_MESSAGE" \
          '{body: $body}')

        COMMENT_RESPONSE=$(curl -sf -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
          -d "$COMMENT_BODY") || {
          echo "Failed to post cooking comment to issue #$ISSUE_NUMBER" >&2
          exit 1
        }

        COOKING_COMMENT_ID=$(echo "$COMMENT_RESPONSE" | jq -r '.id // empty')
        if [[ -z "$COOKING_COMMENT_ID" ]]; then
          echo "Failed to parse cooking_comment_id from response" >&2
          echo "Response was: $COMMENT_RESPONSE" >&2
          exit 1
        fi
        echo "cooking_comment_id=$COOKING_COMMENT_ID" >> $GITHUB_OUTPUT
        echo "Posted cooking message to issue #$ISSUE_NUMBER (comment #$COOKING_COMMENT_ID)"

    - name: Install Infer CLI
      id: install-cli
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.dry-run != 'true'
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        curl -fsSL https://raw.githubusercontent.com/inference-gateway/cli/main/install.sh | bash -s -- ${VERSION:+--version $VERSION}
        infer version

    - name: Initialize Infer userspace config
      id: init-userspace
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.dry-run != 'true'
      shell: bash
      run: |
        set -euo pipefail

        infer init

    - name: Hide Infer workspace from git
      id: hide-infer-workspace
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      run: |
        set -uo pipefail

        # The CLI writes runtime state under .infer/ while the agent runs
        # (agents.yaml for A2A agents, conversations, logs). Keep those writes
        # out of the agent's `git add -A` so they never land in its commits or
        # trip the recover step's stopped-early dirty-tree check.
        if ! git rev-parse --git-dir >/dev/null 2>&1; then
          echo "Not a git repository; skipping .infer/ hide step."
          exit 0
        fi

        # Untracked consumer repos: exclude .infer/ locally so it is never staged.
        GIT_EXCLUDE="$(git rev-parse --git-path info/exclude 2>/dev/null || echo .git/info/exclude)"
        mkdir -p "$(dirname "$GIT_EXCLUDE")"
        if ! grep -qxF '.infer/' "$GIT_EXCLUDE" 2>/dev/null; then
          echo '.infer/' >> "$GIT_EXCLUDE"
          echo "Added .infer/ to $GIT_EXCLUDE"
        fi

        # Repos that track .infer/ (this action dogfooding itself): stop git from
        # seeing runtime modifications to those tracked files.
        TRACKED="$(git ls-files -z -- .infer/ 2>/dev/null || true)"
        if [[ -n "$TRACKED" ]]; then
          printf '%s' "$TRACKED" | xargs -0 -r git update-index --skip-worktree 2>/dev/null || true
          echo "Marked tracked .infer/ files skip-worktree"
        fi

    - name: Install Infer skills
      id: install-skills
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.dry-run != 'true' && inputs.skills != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -e

        SKILLS_INPUT=$(cat <<'SKILLS_EOF'
        ${{ inputs.skills }}
        SKILLS_EOF
        )

        FILTERED=$(printf '%s\n' "$SKILLS_INPUT" \
          | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
          | grep -Ev '^([[:space:]]*$|#)' || true)

        if [[ -z "$FILTERED" ]]; then
          echo "No skills to install (input was empty after filtering comments and blanks)."
          exit 0
        fi

        while IFS= read -r entry; do
          [[ -z "$entry" ]] && continue
          echo "Installing skill: ${entry}"
          infer skills install "$entry" --user --overwrite
        done <<< "$FILTERED"

        echo ""
        echo "Discovered skills after install:"
        infer skills list

        echo "INFER_AGENT_SKILLS_ENABLED=true" >> $GITHUB_ENV

    - name: Setup A2A agents
      id: setup-agents
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.dry-run != 'true' && inputs.agents != ''
      shell: bash
      env:
        AGENT_MODEL: ${{ steps.check-trigger.outputs.model_override || inputs.model }}
      run: |
        set -o pipefail

        AGENTS_INPUT=$(cat <<'AGENTS_EOF'
        ${{ inputs.agents }}
        AGENTS_EOF
        )

        # Normalise: split on commas and newlines, strip whitespace, drop blanks and comments
        ENTRIES=$(printf '%s\n' "$AGENTS_INPUT" \
          | tr ',' '\n' \
          | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
          | grep -Ev '^([[:space:]]*$|#)' || true)

        if [[ -z "$ENTRIES" ]]; then
          echo "No agents to set up (input was empty after filtering)."
          exit 0
        fi

        # A2A agents run as local Docker containers; warn (don't fail) if Docker
        # is missing so the run still proceeds.
        if ! command -v docker >/dev/null 2>&1; then
          echo "::warning::docker not found on the runner - A2A agents run as local Docker containers and will not start. Registering their config anyway."
        fi

        # trim leading/trailing whitespace from $1
        trim() { local s="$1"; s="${s#"${s%%[![:space:]]*}"}"; s="${s%"${s##*[![:space:]]}"}"; printf '%s' "$s"; }

        # The CLI knows the first-party agents (browser-agent, mock-agent,
        # google-calendar-agent, documentation-agent, n8n-agent) and fills in
        # their OCI image + localhost URL itself, so a bare name is enough. A
        # `name=oci-image` pair registers a custom image on an auto-assigned
        # localhost port. `--run` makes it a local container; the CLI requires
        # `--model` whenever `--run` is set, so default every agent to the same
        # model as the main run (the model the workflow already has a key for).
        ANY_ADDED=false
        CUSTOM_PORT=8090

        while IFS= read -r entry; do
          [[ -z "$entry" ]] && continue

          if [[ "$entry" == *"="* ]]; then
            AGENT_NAME="$(trim "${entry%%=*}")"
            AGENT_IMAGE="$(trim "${entry#*=}")"
            if [[ -z "$AGENT_NAME" || -z "$AGENT_IMAGE" ]]; then
              echo "::warning::malformed custom agent entry '$entry' (expected name=oci-image); skipping."
              continue
            fi
            echo "Registering custom A2A agent: $AGENT_NAME (image: $AGENT_IMAGE)"
            if infer agents add "$AGENT_NAME" "http://localhost:${CUSTOM_PORT}" --oci "$AGENT_IMAGE" --run --model "$AGENT_MODEL"; then
              infer agents enable "$AGENT_NAME" || true
              ANY_ADDED=true
              CUSTOM_PORT=$((CUSTOM_PORT + 1))
            else
              echo "::warning::failed to register custom agent '$AGENT_NAME'; skipping."
            fi
          else
            AGENT_NAME="$entry"
            echo "Registering A2A agent: $AGENT_NAME"
            if infer agents add "$AGENT_NAME" --run --model "$AGENT_MODEL"; then
              infer agents enable "$AGENT_NAME" || true
              ANY_ADDED=true
            else
              echo "::warning::'$AGENT_NAME' is not a known first-party agent. Use NAME=OCI_IMAGE to register a custom image. Skipping."
            fi
          fi
        done <<< "$ENTRIES"

        if [[ "$ANY_ADDED" == "true" ]]; then
          # Enable A2A so `infer agent` starts the registered containers and
          # exposes them to the model via the A2A tools.
          echo "INFER_A2A_ENABLED=true" >> "$GITHUB_ENV"
          echo ""
          echo "Configured A2A agents:"
          infer agents list || true
        else
          echo "No A2A agents were registered; leaving A2A disabled."
        fi

    - name: Configure Git
      id: configure-git
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        APP_SLUG: ${{ inputs.github-app-slug }}
      run: |
        set -euo pipefail

        BOT_LOGIN=""
        BOT_ID=""
        if [[ -n "${APP_SLUG:-}" ]]; then
          BOT_LOGIN="${APP_SLUG}[bot]"
          BOT_ID="$(gh api "/users/${APP_SLUG}[bot]" --jq '.id' 2>/dev/null || true)"
        fi

        if [[ -z "$BOT_LOGIN" || ! "$BOT_ID" =~ ^[0-9]+$ ]]; then
          BOT_LOGIN="github-actions[bot]"
          BOT_ID="41898282"
        fi

        git config --global user.name "$BOT_LOGIN"
        git config --global user.email "${BOT_ID}+${BOT_LOGIN}@users.noreply.github.com"

        BOT_EMAIL="${BOT_ID}+${BOT_LOGIN}@users.noreply.github.com"
        {
          echo "GIT_AUTHOR_NAME=${BOT_LOGIN}"
          echo "GIT_AUTHOR_EMAIL=${BOT_EMAIL}"
          echo "GIT_COMMITTER_NAME=${BOT_LOGIN}"
          echo "GIT_COMMITTER_EMAIL=${BOT_EMAIL}"
        } >> "$GITHUB_ENV"

        echo "Git configured for commits as ${BOT_LOGIN} (${BOT_ID})"

    - name: Set up persistent memory
      id: setup-memory
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.memory-repo != '' && inputs.dry-run != 'true'
      shell: bash
      env:
        MEMORY_REPO: ${{ inputs.memory-repo }}
        MEMORY_BRANCH: ${{ inputs.memory-branch }}
        MEMORY_SYNC_ON_START: ${{ inputs.memory-sync-on-start }}
        MEMORY_SYNC_ON_FINISH: ${{ inputs.memory-sync-on-finish }}
        MEMORY_DEPLOY_KEY: ${{ inputs.memory-deploy-key }}
        MEMORY_TOKEN: ${{ inputs.memory-token }}
        GH_TOKEN: ${{ inputs.github-token }}
        SERVER_URL: ${{ github.server_url }}
      run: |
        set -euo pipefail

        case "${MEMORY_SYNC_ON_START:-}" in
          "" | pull | off) ;;
          *)
            echo "::error::memory-sync-on-start must be 'pull' or 'off' (got '${MEMORY_SYNC_ON_START}')"
            exit 1
            ;;
        esac
        case "${MEMORY_SYNC_ON_FINISH:-}" in
          "" | push | off) ;;
          *)
            echo "::error::memory-sync-on-finish must be 'push' or 'off' (got '${MEMORY_SYNC_ON_FINISH}')"
            exit 1
            ;;
        esac

        SCHEME=""
        HOST=""
        REPO_PATH=""
        if [[ "$MEMORY_REPO" =~ ^https://([^/]+)/(.+)$ ]]; then
          SCHEME="https"
          HOST="${BASH_REMATCH[1]}"
          REPO_PATH="${BASH_REMATCH[2]}"
        elif [[ "$MEMORY_REPO" =~ ^ssh://([^@/]+@)?([^:/]+)(:[0-9]+)?/.+$ ]]; then
          SCHEME="ssh"
          HOST="${BASH_REMATCH[2]}"
        elif [[ "$MEMORY_REPO" =~ ^[^@/]+@([^:/]+):.+$ ]]; then
          SCHEME="ssh"
          HOST="${BASH_REMATCH[1]}"
        else
          echo "::error::memory-repo '${MEMORY_REPO}' is not a recognized git URL (expected https://HOST/PATH, ssh://[user@]HOST/PATH or user@HOST:PATH)"
          exit 1
        fi

        {
          echo "INFER_MEMORY_ENABLED=true"
          echo "INFER_MEMORY_BACKEND_TYPE=git"
          echo "INFER_MEMORY_BACKEND_GIT_REPO=${MEMORY_REPO}"
        } >> "$GITHUB_ENV"
        [[ -n "${MEMORY_BRANCH:-}" ]] && echo "INFER_MEMORY_BACKEND_GIT_BRANCH=${MEMORY_BRANCH}" >> "$GITHUB_ENV"
        [[ -n "${MEMORY_SYNC_ON_START:-}" ]] && echo "INFER_MEMORY_BACKEND_GIT_SYNC_ON_START=${MEMORY_SYNC_ON_START}" >> "$GITHUB_ENV"
        [[ -n "${MEMORY_SYNC_ON_FINISH:-}" ]] && echo "INFER_MEMORY_BACKEND_GIT_SYNC_ON_FINISH=${MEMORY_SYNC_ON_FINISH}" >> "$GITHUB_ENV"

        if [[ "$SCHEME" == "ssh" ]]; then
          if [[ -n "${MEMORY_TOKEN:-}" ]]; then
            echo "::notice::memory-token is ignored because memory-repo is an ssh URL - use memory-deploy-key, or switch memory-repo to https."
          fi
          if [[ -z "${MEMORY_DEPLOY_KEY:-}" ]]; then
            echo "::warning::memory-repo is an ssh URL but memory-deploy-key is not set - memory sync will fail unless the runner already has ambient ssh credentials for ${HOST}."
          else
            mkdir -p "$HOME/.ssh"
            chmod 700 "$HOME/.ssh"
            KEY_FILE="$HOME/.ssh/infer-memory-deploy-key"
            printf '%s\n' "$MEMORY_DEPLOY_KEY" > "$KEY_FILE"
            chmod 600 "$KEY_FILE"
            ssh-keyscan -H "$HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
            git config --global core.sshCommand "ssh -i ${KEY_FILE} -o IdentitiesOnly=yes"
            echo "Memory auth configured: ssh deploy key for ${HOST}"
          fi
        else
          if [[ -n "${MEMORY_DEPLOY_KEY:-}" ]]; then
            echo "::notice::memory-deploy-key is ignored because memory-repo is an https URL - use memory-token, or switch memory-repo to ssh."
          fi
          TOKEN="${MEMORY_TOKEN:-}"
          if [[ -z "$TOKEN" ]]; then
            SERVER_HOST="${SERVER_URL#https://}"
            SERVER_HOST="${SERVER_HOST#http://}"
            SERVER_HOST="${SERVER_HOST%%/*}"
            if [[ "$HOST" == "$SERVER_HOST" ]]; then
              TOKEN="$GH_TOKEN"
              echo "::notice::memory-repo has no memory-token - falling back to github-token. This only works for repos that token can write to, e.g. a memory branch of the workflow repo itself."
            else
              echo "::warning::memory-repo is set but no memory-token or memory-deploy-key is provided, and host '${HOST}' is not this GitHub instance - memory sync will fail unless the runner has ambient git credentials."
            fi
          fi
          if [[ -n "$TOKEN" ]]; then
            echo "::add-mask::${TOKEN}"
            git config --global "url.https://x-access-token:${TOKEN}@${HOST}/${REPO_PATH}.insteadOf" "https://${HOST}/${REPO_PATH}"
            echo "Memory auth configured: token rewrite for https://${HOST}/${REPO_PATH}"
          fi
        fi

        echo "Persistent memory enabled: ${MEMORY_REPO} (branch: ${MEMORY_BRANCH:-main})"

    - name: Setup Bun for action runtime
      if: steps.check-trigger.outputs.triggered == 'true'
      uses: oven-sh/setup-bun@v2.2.0
      with:
        bun-version: "1.3.13"

    - name: Set up Claude Code subscription mode
      id: setup-claude-code
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.use-claude-code-subscription == 'true' && inputs.dry-run != 'true'
      shell: bash
      env:
        CLAUDE_CODE_CLI_VERSION: ${{ inputs.claude-code-cli-version }}
        MAX_TURNS: ${{ inputs.max-turns }}
        MAX_OUTPUT_TOKENS: ${{ inputs.claude-code-max-output-tokens }}
        THINKING_BUDGET: ${{ inputs.claude-code-thinking-budget }}
      run: |
        set -euo pipefail

        npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_CLI_VERSION}"
        claude --version

        {
          echo "INFER_CLAUDE_CODE_ENABLED=true"
          echo "INFER_GATEWAY_RUN=false"
          echo "INFER_CLAUDE_CODE_MAX_TURNS=${MAX_TURNS}"
        } >> "$GITHUB_ENV"

        if [[ -n "${MAX_OUTPUT_TOKENS}" ]]; then
          echo "INFER_CLAUDE_CODE_MAX_OUTPUT_TOKENS=${MAX_OUTPUT_TOKENS}" >> "$GITHUB_ENV"
        fi
        if [[ -n "${THINKING_BUDGET}" ]]; then
          echo "INFER_CLAUDE_CODE_THINKING_BUDGET=${THINKING_BUDGET}" >> "$GITHUB_ENV"
        fi

    - name: Print configuration summary
      id: config-summary
      if: steps.check-trigger.outputs.triggered == 'true' && inputs.debug == 'true'
      shell: bash
      env:
        MODEL: ${{ steps.check-trigger.outputs.model_override || inputs.model }}
        MODEL_OVERRIDE: ${{ steps.check-trigger.outputs.model_override }}
        USE_SUBSCRIPTION: ${{ inputs.use-claude-code-subscription }}
        CONTEXT_KIND: ${{ steps.check-trigger.outputs.context_kind }}
        MAX_TURNS: ${{ inputs.max-turns }}
        COMPACT_AUTO_AT: ${{ inputs.compact-auto-at }}
        SKILLS: ${{ inputs.skills }}
        AGENTS: ${{ inputs.agents }}
        ENABLE_GIT_OPERATIONS: ${{ inputs.enable-git-operations }}
        DRY_RUN: ${{ inputs.dry-run }}
        WEB_FETCH_DOMAINS: ${{ inputs.web-fetch-domains }}
        MEMORY_REPO: ${{ inputs.memory-repo }}
        MEMORY_BRANCH: ${{ inputs.memory-branch }}
        MEMORY_SYNC_ON_START: ${{ inputs.memory-sync-on-start }}
        MEMORY_SYNC_ON_FINISH: ${{ inputs.memory-sync-on-finish }}
        MEMORY_DEPLOY_KEY: ${{ inputs.memory-deploy-key }}
        MEMORY_TOKEN: ${{ inputs.memory-token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GOOGLE_API_KEY: ${{ inputs.google-api-key }}
        DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        MISTRAL_API_KEY: ${{ inputs.mistral-api-key }}
        CLOUDFLARE_API_KEY: ${{ inputs.cloudflare-api-key }}
        COHERE_API_KEY: ${{ inputs.cohere-api-key }}
        OLLAMA_API_KEY: ${{ inputs.ollama-api-key }}
        OLLAMA_CLOUD_API_KEY: ${{ inputs.ollama-cloud-api-key }}
        MOONSHOT_API_KEY: ${{ inputs.moonshot-api-key }}
        MINIMAX_API_KEY: ${{ inputs.minimax-api-key }}
      run: |
        state() { if [[ -n "${1:-}" ]]; then echo "set"; else echo "(not set)"; fi; }

        if [[ "${USE_SUBSCRIPTION:-}" == "true" ]]; then
          mode="Claude Code subscription (in-job gateway disabled)"
        else
          mode="Inference Gateway"
        fi

        echo "::group::infer config (debug)"
        printf '%-30s %s\n' "model:" "${MODEL:-(unset)}"
        [[ -n "${MODEL_OVERRIDE:-}" ]] && printf '%-30s %s\n' "model (/model override):" "${MODEL_OVERRIDE}"
        printf '%-30s %s\n' "execution mode:" "${mode}"
        printf '%-30s %s\n' "use-claude-code-subscription:" "${USE_SUBSCRIPTION:-false}"
        printf '%-30s %s\n' "context:" "${CONTEXT_KIND:-direct}"
        printf '%-30s %s\n' "max-turns:" "${MAX_TURNS:-}"
        printf '%-30s %s\n' "compact-auto-at:" "${COMPACT_AUTO_AT:-}"
        printf '%-30s %s\n' "enable-git-operations:" "${ENABLE_GIT_OPERATIONS:-}"
        printf '%-30s %s\n' "dry-run:" "${DRY_RUN:-}"
        printf '%-30s %s\n' "skills:" "${SKILLS:-(none)}"
        printf '%-30s %s\n' "agents:" "${AGENTS:-(none)}"
        printf '%-30s %s\n' "web-fetch-domains:" "${WEB_FETCH_DOMAINS:-(default)}"
        printf '%-30s %s\n' "memory-repo:" "${MEMORY_REPO:-(disabled)}"
        if [[ -n "${MEMORY_REPO:-}" ]]; then
          printf '%-30s %s\n' "memory-branch:" "${MEMORY_BRANCH:-(CLI default: main)}"
          printf '%-30s %s\n' "memory-sync-on-start:" "${MEMORY_SYNC_ON_START:-(CLI default: pull)}"
          printf '%-30s %s\n' "memory-sync-on-finish:" "${MEMORY_SYNC_ON_FINISH:-(CLI default: push)}"
        fi
        echo "-- credentials (presence only) --"
        printf '%-30s %s\n' "anthropic-api-key:" "$(state "${ANTHROPIC_API_KEY:-}")"
        printf '%-30s %s\n' "claude-code-oauth-token:" "$(state "${CLAUDE_CODE_OAUTH_TOKEN:-}")"
        printf '%-30s %s\n' "openai-api-key:" "$(state "${OPENAI_API_KEY:-}")"
        printf '%-30s %s\n' "google-api-key:" "$(state "${GOOGLE_API_KEY:-}")"
        printf '%-30s %s\n' "deepseek-api-key:" "$(state "${DEEPSEEK_API_KEY:-}")"
        printf '%-30s %s\n' "groq-api-key:" "$(state "${GROQ_API_KEY:-}")"
        printf '%-30s %s\n' "mistral-api-key:" "$(state "${MISTRAL_API_KEY:-}")"
        printf '%-30s %s\n' "cloudflare-api-key:" "$(state "${CLOUDFLARE_API_KEY:-}")"
        printf '%-30s %s\n' "cohere-api-key:" "$(state "${COHERE_API_KEY:-}")"
        printf '%-30s %s\n' "ollama-api-key:" "$(state "${OLLAMA_API_KEY:-}")"
        printf '%-30s %s\n' "ollama-cloud-api-key:" "$(state "${OLLAMA_CLOUD_API_KEY:-}")"
        printf '%-30s %s\n' "moonshot-api-key:" "$(state "${MOONSHOT_API_KEY:-}")"
        printf '%-30s %s\n' "minimax-api-key:" "$(state "${MINIMAX_API_KEY:-}")"
        printf '%-30s %s\n' "memory-deploy-key:" "$(state "${MEMORY_DEPLOY_KEY:-}")"
        printf '%-30s %s\n' "memory-token:" "$(state "${MEMORY_TOKEN:-}")"
        echo "::endgroup::"

        if [[ "${USE_SUBSCRIPTION:-}" == "true" ]]; then
          [[ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]] && echo "::warning::use-claude-code-subscription is true but claude-code-oauth-token is empty - the Claude Code CLI has no subscription credential to authenticate with."
        else
          provider="${MODEL%%/*}"
          if [[ -n "${provider}" && "${provider}" != "${MODEL}" ]]; then
            case "${provider}" in
              anthropic) key="${ANTHROPIC_API_KEY:-}" ;;
              openai) key="${OPENAI_API_KEY:-}" ;;
              google) key="${GOOGLE_API_KEY:-}" ;;
              deepseek) key="${DEEPSEEK_API_KEY:-}" ;;
              groq) key="${GROQ_API_KEY:-}" ;;
              mistral) key="${MISTRAL_API_KEY:-}" ;;
              cloudflare) key="${CLOUDFLARE_API_KEY:-}" ;;
              cohere) key="${COHERE_API_KEY:-}" ;;
              ollama) key="${OLLAMA_API_KEY:-}" ;;
              ollama_cloud) key="${OLLAMA_CLOUD_API_KEY:-}" ;;
              moonshot) key="${MOONSHOT_API_KEY:-}" ;;
              minimax) key="${MINIMAX_API_KEY:-}" ;;
              *) key="present" ;;
            esac
            [[ -z "${key}" ]] && echo "::warning::model '${MODEL}' uses provider '${provider}', but its API key is not set (and use-claude-code-subscription is false) - the in-job gateway won't register that provider, so the model will be unavailable."
          fi
        fi

        exit 0

    - name: Run Infer agent
      id: run-agent
      if: steps.check-trigger.outputs.triggered == 'true'
      shell: bash
      env:
        # Provider keys
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GOOGLE_API_KEY: ${{ inputs.google-api-key }}
        DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        MISTRAL_API_KEY: ${{ inputs.mistral-api-key }}
        CLOUDFLARE_API_KEY: ${{ inputs.cloudflare-api-key }}
        COHERE_API_KEY: ${{ inputs.cohere-api-key }}
        OLLAMA_API_KEY: ${{ inputs.ollama-api-key }}
        OLLAMA_CLOUD_API_KEY: ${{ inputs.ollama-cloud-api-key }}
        MOONSHOT_API_KEY: ${{ inputs.moonshot-api-key }}
        MINIMAX_API_KEY: ${{ inputs.minimax-api-key }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
        MEMORY_TOKEN: ${{ inputs.memory-token }}
        MEMORY_DEPLOY_KEY: ${{ inputs.memory-deploy-key }}
        # Runner config
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INFER_AGENT_MODEL: ${{ steps.check-trigger.outputs.model_override || inputs.model }}
        INFER_AGENT_MAX_TURNS: ${{ inputs.max-turns }}
        INFER_REPO: ${{ github.repository }}
        INFER_ISSUE_NUMBER: ${{ github.event.issue.number }}
        INFER_ISSUE_TITLE: ${{ github.event.issue.title }}
        INFER_ISSUE_BODY: ${{ github.event.issue.body }}
        INFER_DIRECT_PROMPT: ${{ inputs.direct-prompt }}
        INFER_CONTEXT_KIND: ${{ steps.check-trigger.outputs.context_kind }}
        INFER_TRIGGERING_COMMENT_ID: ${{ steps.check-trigger.outputs.comment_id }}
        INFER_TRIGGERING_COMMENT_BODY: ${{ github.event.comment.body }}
        INFER_TRIGGERING_COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        INFER_COOKING_COMMENT_ID: ${{ steps.cooking-message.outputs.cooking_comment_id }}
        INFER_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        INFER_CUSTOM_INSTRUCTIONS: ${{ inputs.custom-instructions }}
        INFER_PROMPT_OVERRIDE_SYSTEM_ISSUE: ${{ inputs.system-prompt-issue }}
        INFER_PROMPT_OVERRIDE_SYSTEM_PR: ${{ inputs.system-prompt-pr }}
        INFER_PROMPT_OVERRIDE_SYSTEM_PR_FORK: ${{ inputs.system-prompt-pr-fork }}
        INFER_PROMPT_OVERRIDE_SYSTEM_DIRECT: ${{ inputs.system-prompt-direct }}
        INFER_PROMPT_OVERRIDE_REMINDER_ISSUE: ${{ inputs.reminder-issue }}
        INFER_PROMPT_OVERRIDE_REMINDER_PR: ${{ inputs.reminder-pr }}
        INFER_PROMPT_OVERRIDE_REMINDER_PR_FORK: ${{ inputs.reminder-pr-fork }}
        INFER_PROMPT_OVERRIDE_REMINDER_DIRECT: ${{ inputs.reminder-direct }}
        INFER_PROMPT_OVERRIDE_TASK_ISSUE: ${{ inputs.task-issue }}
        INFER_PROMPT_OVERRIDE_TASK_PR: ${{ inputs.task-pr }}
        INFER_PROMPT_OVERRIDE_TASK_DIRECT: ${{ inputs.task-direct }}
        INFER_ENABLE_GIT_OPERATIONS: ${{ inputs.enable-git-operations }}
        INFER_BASH_ALLOW_APPEND: ${{ inputs.bash-allow-append }}
        INFER_TOOLS_WRITE_REQUIRE_APPROVAL: "false"
        INFER_TOOLS_EDIT_REQUIRE_APPROVAL: "false"
        INFER_TOOLS_DELETE_REQUIRE_APPROVAL: "false"
        INFER_TOOLS_WEB_FETCH_ALLOWED_DOMAINS: ${{ inputs.web-fetch-domains || 'github.com,raw.githubusercontent.com,api.github.com' }}
        INFER_LOGGING_DEBUG: ${{ inputs.debug }}
        INFER_COMPACT_AUTO_AT: ${{ inputs.compact-auto-at }}
        INFER_REDACT_HEURISTICS: ${{ inputs.enable-heuristic-redaction }}
        INFER_MIRROR_AGENT_LOGS: ${{ inputs.mirror-agent-logs }}
        INFER_DRY_RUN: ${{ inputs.dry-run }}
        INFER_REMINDERS_ENABLED: "true"
        INFER_BIN: ${{ inputs.dry-run == 'true' && format('{0}/__tests__/fixtures/mock-agent.mjs', github.action_path) || '' }}
        MOCK_SCENARIO: ${{ inputs.mock-agent-scenario }}
        MOCK_TICK_MS: "500"
        MOCK_MAKE_COMMIT: ${{ (inputs.dry-run == 'true' && (inputs.mock-agent-scenario == 'happy' || inputs.mock-agent-scenario == 'commit-no-push')) && '1' || '0' }}
      run: exec bun "$GITHUB_ACTION_PATH/dist/runner/index.js"

    - name: Salvage unfinished work
      id: salvage
      if: steps.check-trigger.outputs.triggered == 'true' && always() && inputs.enable-git-operations == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GOOGLE_API_KEY: ${{ inputs.google-api-key }}
        DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        MISTRAL_API_KEY: ${{ inputs.mistral-api-key }}
        CLOUDFLARE_API_KEY: ${{ inputs.cloudflare-api-key }}
        COHERE_API_KEY: ${{ inputs.cohere-api-key }}
        OLLAMA_API_KEY: ${{ inputs.ollama-api-key }}
        OLLAMA_CLOUD_API_KEY: ${{ inputs.ollama-cloud-api-key }}
        MOONSHOT_API_KEY: ${{ inputs.moonshot-api-key }}
        MINIMAX_API_KEY: ${{ inputs.minimax-api-key }}
        MEMORY_TOKEN: ${{ inputs.memory-token }}
        MEMORY_DEPLOY_KEY: ${{ inputs.memory-deploy-key }}
        INFER_REDACT_HEURISTICS: ${{ inputs.enable-heuristic-redaction }}
        INFER_DRY_RUN: ${{ inputs.dry-run }}
        INFER_REPO: ${{ github.repository }}
        INFER_ISSUE_NUMBER: ${{ github.event.issue.number }}
        INFER_ISSUE_TITLE: ${{ github.event.issue.title }}
        INFER_ISSUE_BODY: ${{ github.event.issue.body }}
        INFER_DIRECT_PROMPT: ${{ inputs.direct-prompt }}
        INFER_CONTEXT_KIND: ${{ steps.check-trigger.outputs.context_kind }}
        INFER_TRIGGERING_COMMENT_ID: ${{ steps.check-trigger.outputs.comment_id }}
        INFER_TRIGGERING_COMMENT_BODY: ${{ github.event.comment.body }}
        INFER_TRIGGERING_COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        INFER_ENABLE_GIT_OPERATIONS: ${{ inputs.enable-git-operations }}
        INFER_RUN_AGENT_EXIT_CODE: ${{ steps.run-agent.outputs.exit-code }}
      run: bun "$GITHUB_ACTION_PATH/dist/salvage/index.js"

    - name: Report result
      id: report
      if: steps.check-trigger.outputs.triggered == 'true' && always()
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GOOGLE_API_KEY: ${{ inputs.google-api-key }}
        DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        MISTRAL_API_KEY: ${{ inputs.mistral-api-key }}
        CLOUDFLARE_API_KEY: ${{ inputs.cloudflare-api-key }}
        COHERE_API_KEY: ${{ inputs.cohere-api-key }}
        OLLAMA_API_KEY: ${{ inputs.ollama-api-key }}
        OLLAMA_CLOUD_API_KEY: ${{ inputs.ollama-cloud-api-key }}
        MOONSHOT_API_KEY: ${{ inputs.moonshot-api-key }}
        MINIMAX_API_KEY: ${{ inputs.minimax-api-key }}
        MEMORY_TOKEN: ${{ inputs.memory-token }}
        MEMORY_DEPLOY_KEY: ${{ inputs.memory-deploy-key }}
        INFER_REDACT_HEURISTICS: ${{ inputs.enable-heuristic-redaction }}
        INFER_DRY_RUN: ${{ inputs.dry-run }}
        INFER_REPO: ${{ github.repository }}
        INFER_ISSUE_NUMBER: ${{ github.event.issue.number }}
        INFER_ISSUE_TITLE: ${{ github.event.issue.title }}
        INFER_ISSUE_BODY: ${{ github.event.issue.body }}
        INFER_DIRECT_PROMPT: ${{ inputs.direct-prompt }}
        INFER_CONTEXT_KIND: ${{ steps.check-trigger.outputs.context_kind }}
        INFER_TRIGGERING_COMMENT_ID: ${{ steps.check-trigger.outputs.comment_id }}
        INFER_TRIGGERING_COMMENT_BODY: ${{ github.event.comment.body }}
        INFER_TRIGGERING_COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        INFER_COOKING_COMMENT_ID: ${{ steps.cooking-message.outputs.cooking_comment_id }}
        INFER_ENABLE_GIT_OPERATIONS: ${{ inputs.enable-git-operations }}
        INFER_MODEL_USED: ${{ steps.check-trigger.outputs.model_override || inputs.model }}
        INFER_RUN_AGENT_EXIT_CODE: ${{ steps.run-agent.outputs.exit-code }}
        INFER_RUN_AGENT_DURATION_MS: ${{ steps.run-agent.outputs.run-duration-ms }}
        INFER_SALVAGED_PR_URL: ${{ steps.salvage.outputs.pr-url }}
        INFER_SALVAGED: ${{ steps.salvage.outputs.salvaged }}
        INFER_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        INFER_ACTOR: ${{ github.actor }}
        OTEL_EXPORTER_OTLP_ENDPOINT: ${{ inputs.otel-exporter-otlp-endpoint }}
        OTEL_EXPORTER_OTLP_HEADERS: ${{ inputs.otel-exporter-otlp-headers }}
        OTEL_EXPORTER_OTLP_PROTOCOL: ${{ inputs.otel-exporter-otlp-protocol }}
        OTEL_SERVICE_NAME: ${{ inputs.otel-service-name }}
        OTEL_RESOURCE_ATTRIBUTES: ${{ inputs.otel-resource-attributes }}
        OTEL_SIGNALS: ${{ inputs.otel-signals }}
        OTEL_EXPORT_TIMEOUT_MS: ${{ inputs.otel-export-timeout-ms }}
      run: bun "$GITHUB_ACTION_PATH/dist/report/index.js"

    - name: Cleanup
      if: steps.check-trigger.outputs.triggered == 'true' && always()
      shell: bash
      env:
        AGENTS_INPUT: ${{ inputs.agents }}
        MEMORY_REPO: ${{ inputs.memory-repo }}
        MEMORY_DEPLOY_KEY_SET: ${{ inputs.memory-deploy-key != '' }}
      run: |
        rm -f /tmp/agent-output.txt /tmp/failed-tool-calls.txt /tmp/infer-todos.json /tmp/infer-cancelled

        if [[ -n "$MEMORY_REPO" ]]; then
          rm -f "$HOME/.ssh/infer-memory-deploy-key" 2>/dev/null || true
          if [[ "$MEMORY_DEPLOY_KEY_SET" == "true" ]]; then
            git config --global --unset core.sshCommand 2>/dev/null || true
          fi
          git config --global --name-only --get-regexp '^url\..*x-access-token.*\.insteadof$' 2>/dev/null |
            while IFS= read -r key; do
              git config --global --unset-all "$key" 2>/dev/null || true
            done
        fi

        if [[ -n "$AGENTS_INPUT" ]] && command -v docker >/dev/null 2>&1; then
          LEFTOVER="$(docker ps -aq --filter "name=inference-agent-" 2>/dev/null || true)"
          if [[ -n "$LEFTOVER" ]]; then
            echo "Removing leftover A2A agent containers..."
            echo "$LEFTOVER" | xargs -r docker rm -f >/dev/null 2>&1 || true
          fi
        fi

        echo "Cleanup completed"
