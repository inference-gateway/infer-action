version: "3"

vars:
  EVENT_DIR: .github/workflows/events

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  setup:
    desc: Setup environment for testing
    cmds:
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
          echo "Created .env file. Please edit it with your API keys."
        else
          echo ".env file already exists"
        fi
      - |
        if ! command -v act &> /dev/null; then
          echo "Error: act is not installed"
          echo "Install with: brew install act"
          exit 1
        fi
        echo "act is installed: $(act --version)"

  lint:
    desc: Lint markdown files
    cmds:
      - markdownlint . --ignore '{CHANGELOG,AGENTS,CLAUDE}.md' --fix

  test:issue:
    desc: |
      Run the local action (uses: ./) against an `issues` event through act in
      dry-run. Mutations are simulated ("would create ... comment"); no token or
      .env needed. Pass a token to resolve real reads: -s GITHUB_TOKEN=$(gh auth token)
    cmds:
      - |
        act issues \
          --eventpath {{.EVENT_DIR}}/issue-opened.json \
          --workflows examples/local/issue.yml \
          -P ubuntu-24.04=catthehacker/ubuntu:act-24.04 {{.CLI_ARGS}}

  test:comment:
    desc: |
      Run the local action against an `issue_comment` event through act in
      dry-run (also exercises the "would add 'eyes' reaction" step).
    cmds:
      - |
        act issue_comment \
          --eventpath {{.EVENT_DIR}}/issue-comment.json \
          --workflows examples/local/comment.yml \
          -P ubuntu-24.04=catthehacker/ubuntu:act-24.04 {{.CLI_ARGS}}

  test:direct:
    desc: |
      Run the local action in direct (workflow_dispatch) mode through act in
      dry-run. Override the prompt with: task test:direct PROMPT="..."
    vars:
      PROMPT: '{{.PROMPT | default "Add a hello world script"}}'
    cmds:
      - |
        act workflow_dispatch \
          --workflows examples/local/direct.yml \
          --input prompt="{{.PROMPT}}" \
          -P ubuntu-24.04=catthehacker/ubuntu:act-24.04 {{.CLI_ARGS}}

  test:list:
    desc: List act jobs for the local issue workflow without executing
    cmds:
      - |
        act issues \
          --eventpath {{.EVENT_DIR}}/issue-opened.json \
          --workflows examples/local/issue.yml \
          --list

  test:all:
    desc: Run all local dry-run examples (issue, comment, direct) through act
    cmds:
      - task: test:issue
      - task: test:comment
      - task: test:direct

  clean:
    desc: Clean up test artifacts
    cmds:
      - rm -f /tmp/agent-output.txt
      - echo "Cleaned up test artifacts"

  build:
    desc: Build the TypeScript hot-path (src/ -> dist/)
    cmds:
      - bun install --frozen-lockfile
      - bun run package

  generate:
    desc: |
      Regenerate the per-provider API-key wiring (action.yml, src/redact.ts,
      README) from the schemas Provider enum, then rebuild dist/. Live-fetches
      the spec at the pinned ref; override with SCHEMAS_REF=... or read a local
      copy with INFER_SCHEMAS_OPENAPI=<path>.
    cmds:
      - bun run generate
      - bun run package

  test:unit:
    desc: Run TypeScript unit tests (bun test)
    cmds:
      - bun run test

  test:mock:
    desc: |
      Run the runner end-to-end against the mock agent. Useful for local
      iteration without needing a real GitHub token or the real infer CLI.
      Failures from the GH API (401) are expected and confirm wiring is correct.
    vars:
      SCENARIO: '{{.SCENARIO | default "happy"}}'
      TICK_MS: '{{.TICK_MS | default "200"}}'
    cmds:
      - |
        INFER_BIN="$PWD/__tests__/fixtures/mock-agent.mjs" \
        MOCK_SCENARIO="{{.SCENARIO}}" \
        MOCK_TICK_MS="{{.TICK_MS}}" \
        GITHUB_TOKEN="local-dev-fake-token" \
        INFER_REPO="local/test" \
        INFER_CONTEXT_KIND="issue" \
        INFER_ISSUE_NUMBER="0" \
        INFER_ISSUE_TITLE="local mock test" \
        INFER_ISSUE_BODY="scenario={{.SCENARIO}}" \
        INFER_COOKING_COMMENT_ID="0" \
        INFER_AGENT_MODEL="mock/mock-v1" \
        INFER_ENABLE_GIT_OPERATIONS="false" \
        bun dist/runner/index.js || true
