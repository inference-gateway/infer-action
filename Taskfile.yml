version: "3"

vars:
  EVENT_DIR: .github/workflows/events
  WORKFLOW: .github/workflows/infer.yml

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  setup:
    desc: Setup environment for testing
    cmds:
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
          echo "Created .env file. Please edit it with your API keys."
        else
          echo ".env file already exists"
        fi
      - |
        if ! command -v act &> /dev/null; then
          echo "Error: act is not installed"
          echo "Install with: brew install act"
          exit 1
        fi
        echo "act is installed: $(act --version)"

  lint:
    desc: Lint markdown files
    cmds:
      - markdownlint . --ignore '{CHANGELOG,AGENTS,CLAUDE}.md' --fix

  test:issue:
    desc: Test with issue opened event
    deps:
      - check-env
    cmds:
      - |
        act issues \
          --eventpath {{.EVENT_DIR}}/issue-opened.json \
          --workflows {{.WORKFLOW}} \
          --secret-file .env \
          --verbose \
          -P ubuntu-24.04=catthehacker/ubuntu:act-24.04

  test:comment:
    desc: Test with issue comment event
    deps:
      - check-env
    cmds:
      - |
        act issue_comment \
          --eventpath {{.EVENT_DIR}}/issue-comment.json \
          --workflows {{.WORKFLOW}} \
          --secret-file .env \
          --verbose \
          -P ubuntu-24.04=catthehacker/ubuntu:act-24.04

  test:dry-run:
    desc: Dry run - list jobs without executing
    cmds:
      - |
        act issues \
          --eventpath {{.EVENT_DIR}}/issue-opened.json \
          --workflows {{.WORKFLOW}} \
          --list

  test:all:
    desc: Run all tests
    deps:
      - check-env
    cmds:
      - task: test:issue
      - task: test:comment

  check-env:
    desc: Check if .env file exists
    internal: true
    preconditions:
      - sh: test -f .env
        msg: ".env file not found. Run 'task setup' first."
    silent: true

  clean:
    desc: Clean up test artifacts
    cmds:
      - rm -f /tmp/agent-output.txt
      - echo "Cleaned up test artifacts"

  build:
    desc: Build the TypeScript hot-path (src/ -> dist/)
    cmds:
      - npm ci
      - npm run package

  test:unit:
    desc: Run TypeScript unit tests (vitest)
    cmds:
      - npm test

  test:mock:
    desc: |
      Run the runner end-to-end against the mock agent. Useful for local
      iteration without needing a real GitHub token or the real infer CLI.
      Failures from the GH API (401) are expected and confirm wiring is correct.
    vars:
      SCENARIO: '{{.SCENARIO | default "happy"}}'
      TICK_MS: '{{.TICK_MS | default "200"}}'
    cmds:
      - |
        INFER_BIN="$PWD/__tests__/fixtures/mock-agent.mjs" \
        MOCK_SCENARIO="{{.SCENARIO}}" \
        MOCK_TICK_MS="{{.TICK_MS}}" \
        GITHUB_TOKEN="local-dev-fake-token" \
        INFER_REPO="local/test" \
        INFER_CONTEXT_KIND="issue" \
        INFER_ISSUE_NUMBER="0" \
        INFER_ISSUE_TITLE="local mock test" \
        INFER_ISSUE_BODY="scenario={{.SCENARIO}}" \
        INFER_COOKING_COMMENT_ID="0" \
        INFER_AGENT_MODEL="mock/mock-v1" \
        INFER_ENABLE_GIT_OPERATIONS="false" \
        node dist/runner/index.js || true
