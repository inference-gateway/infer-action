---
branches:
  - main
  - name: rc
    prerelease: true

tagFormat: "v${version}"

plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - type: feat
          release: minor
        - type: fix
          release: patch
        - type: docs
          release: patch
        - type: chore
          release: patch
        - type: ci
          release: patch
        - type: refactor
          release: patch
        - breaking: true
          release: major

  - - "@semantic-release/release-notes-generator"
    - preset: conventionalcommits
      presetConfig:
        types:
          - type: feat
            section: "Features"
            hidden: false
          - type: fix
            section: "Bug Fixes"
            hidden: false
          - type: docs
            section: "Documentation"
            hidden: false
          - type: chore
            section: "Maintenance"
            hidden: false
          - type: ci
            section: "Continuous Integration"
            hidden: false
          - type: refactor
            section: "Refactoring"
            hidden: false

  - - "@semantic-release/changelog"
    - changelogFile: CHANGELOG.md

  - - "@semantic-release/npm"
    - npmPublish: false

  - - "@semantic-release/exec"
    - prepareCmd: "bun run package"
      verifyConditionsCmd: "exit 0"

  - - "@semantic-release/git"
    - assets:
        - CHANGELOG.md
        - package.json
        - dist/
      message: "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"

  - - "@semantic-release/github"
    - assets:
        - CHANGELOG.md
