# Node.js project with a custom trigger phrase and an extended bash allow-list.
#
# `bash-allow-append` adds project tooling (npm/pnpm/node/task) on top of the CLI's
# read-only baseline (file reads, read-only git/gh + `gh project` read) and the
# action's own git-write append, so the agent can install deps and run the build/tests
# before committing, then branch, commit, push, and open a PR. Entries are Go regexes
# anchored to the whole command, so include arguments explicitly (e.g. `npm( .*)?`).
#
# Copy this into `.github/workflows/` in your repo.
name: Infer Agent (Node.js)

on:
  issues:
    types:
      - opened
      - edited
  issue_comment:
    types:
      - created

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  infer:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - uses: inference-gateway/infer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          trigger-phrase: "@bot" # respond to "@bot" instead of "@infer"
          model: openai/gpt-4
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          bash-allow-append: "pnpm( .*)?,npm( .*)?,node( .*)?,task( .*)?"
